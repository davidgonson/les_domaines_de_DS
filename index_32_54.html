<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Les Domaines de DS</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Domaines DS">
<meta name="theme-color" content="#993556">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='32' fill='%23993556'/%3E%3Ctext x='90' y='118' font-family='-apple-system,Helvetica,Arial,sans-serif' font-size='74' font-weight='700' fill='white' text-anchor='middle'%3EDS%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='32' fill='%23993556'/%3E%3Ctext x='90' y='118' font-family='-apple-system,Helvetica,Arial,sans-serif' font-size='74' font-weight='700' fill='white' text-anchor='middle'%3EDS%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:#f5f4f1;font-size:14px;min-height:100vh}
.app{max-width:920px;margin:0 auto;padding:0.6rem 1rem 1rem}
.topbar{display:flex;align-items:center;gap:6px;padding:5px 0 7px;border-bottom:1px solid #e5e3de;margin-bottom:7px;flex-wrap:nowrap}
.topbar h1{font-size:13px;font-weight:600;flex:1;margin-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.ba{background:#FBEAF0;color:#72243E}.bp{background:#E1F5EE;color:#085041}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d5d3ce;font-size:12px;cursor:pointer;font-family:inherit;background:#fff;color:#1a1a1a;transition:background .15s}
.btn:hover{background:#f0eeea}
.btn-primary{background:#993556;color:#fff;border-color:#993556}.btn-primary:hover{background:#72243E;border-color:#72243E}
.btn-resa{background:#0C2D52;color:#fff;border-color:#0C2D52}.btn-resa:hover{background:#081F38;border-color:#081F38}
.btn-visite{background:#185FA5;color:#fff;border-color:#185FA5}.btn-visite:hover{background:#124A82;border-color:#124A82}
.btn-prestation{background:#E6F1FB;color:#185FA5;border-color:#B5D4F4}.btn-prestation:hover{background:#D8EAF8}
.btn-sm{padding:4px 10px;font-size:12px}.btn-xs{padding:2px 7px;font-size:11px}
.btn-danger{color:#A32D2D;border-color:#F7C1C1;background:#fff}.btn-danger:hover{background:#FCEBEB}
.tabs{display:flex;gap:3px;margin-bottom:8px;background:#ebe9e4;border-radius:8px;padding:2px}
.dom-picker{display:flex;gap:8px}
.dom-box{flex:1;text-align:center;padding:7px 6px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;user-select:none}
.dom-box.sel{opacity:1;box-shadow:0 0 0 2px rgba(0,0,0,.3) inset}
.dom-box.fade{opacity:.3}
.tab{flex:1;padding:4px 1px;text-align:center;border-radius:6px;cursor:pointer;font-size:12px;border:none;background:transparent;color:#666;font-family:inherit;transition:background .15s;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.tab .tab-ic{font-size:16px;line-height:1}
.tab .tab-lbl{font-weight:500;text-transform:uppercase;font-size:8px;letter-spacing:.02em;line-height:1.1}
.tab.active{background:#fff;color:#1a1a1a;font-weight:500;border:1px solid #d5d3ce}
input,select,textarea{width:100%;padding:7px 10px;border:1.5px solid #c2bfb6;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#993556;box-shadow:0 0 0 3px rgba(153,53,86,.15)}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
input[type=date]{padding-right:6px}
input[type=date]::-webkit-calendar-picker-indicator{display:none}
.date-row{display:flex;align-items:stretch;gap:2px;flex-direction:row-reverse}
.date-row input[type=date]{flex:1;min-width:0}
.date-btn{flex-shrink:0;width:24px;border:none;background:transparent;color:#A32D2D;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.date-btn:hover{color:#791F1F}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:5px}
.pay-inline{border:1px solid transparent;background:transparent;font:inherit;color:inherit;padding:2px 4px;font-size:13px;border-radius:4px}
.pay-inline:hover{border-color:#ddd}
.pay-inline:focus{background:#fff;border-color:#999;outline:none}
/* Lignes de paiement en grille : date · montant · type sur une ligne, commentaire + suppression à côté.
   Sur téléphone, le commentaire et la suppression passent proprement sur une 2e ligne. */
.payrow{display:grid;grid-template-columns:118px 72px 96px 1fr 26px;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid #f0eee8}
.payrow>.field{margin:0;min-width:0}
.modal .payrow input,.modal .payrow select{width:100%;font-size:12.5px!important;padding:4px 6px!important}
.payrow .pr-del{display:flex;align-items:center;justify-content:center}
@media(max-width:640px){
  .payrow{grid-template-columns:104px 56px 1fr 26px;column-gap:5px;row-gap:4px}
  .payrow .pr-del{grid-column:4;grid-row:1;justify-self:end}
  .payrow .pr-com{grid-column:1 / -1;grid-row:2}
  .modal .payrow input,.modal .payrow select{font-size:11.5px!important;padding:4px 5px!important}
  #week-num-col{width:11px!important}
}
.g2-compact{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.g2-compact .field{gap:2px}
.g2-compact .field label{font-size:10.5px}
.g2-compact .field input,.g2-compact .field select{font-size:12px;padding:6px 7px}
.field label{font-size:11px;color:#444;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.form-section{background:#f5f4f1;border:1px solid #e3e0d8;border-radius:10px;padding:8px 10px;margin-bottom:8px}
.form-section-title{font-size:10.5px;color:#993556;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.form-section-title::before{content:'';width:4px;height:13px;background:#993556;border-radius:2px;display:inline-block}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.p0{background:#FBEAF0;color:#72243E}.p1{background:#FFF8E6;color:#7A5800}.p2{background:#EAF3DE;color:#27500A}.p3{background:#EEEDFE;color:#3C3489}.p4{background:#E6F1FB;color:#0C447C}
.status{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.s-confirmé{background:#EAF3DE;color:#27500A}.s-option{background:#FAEEDA;color:#633806}.s-annulé{background:#FCEBEB;color:#791F1F}
.pay-full{background:#EAF3DE;color:#27500A;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:500}
.pay-part{background:#FAEEDA;color:#633806;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:500}
.pay-none{background:#FCEBEB;color:#791F1F;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:500}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-ok{background:#EAF3DE;color:#27500A}.alert-info{background:#E6F1FB;color:#0C447C}
.metric{background:#fff;border:1px solid #e5e3de;border-radius:10px;padding:.85rem;text-align:center}
.metric .val{font-size:20px;font-weight:500;display:block;margin-top:3px}
.metric .lbl{font-size:11px;color:#666}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding-top:40px;z-index:100;overflow:hidden}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:96%;max-width:560px;border:1px solid #e5e3de;margin-bottom:40px;max-height:calc(100vh - 80px);overflow-y:auto}
.modal-sticky-top{position:sticky;top:-1.5rem;margin:-1.5rem -1.5rem 14px;padding:1.5rem 1.5rem 14px;background:#fff;z-index:5;border-bottom:1px solid #e5e3de}
.modal input,.modal select,.modal textarea{-webkit-user-select:text;user-select:text;touch-action:manipulation;font-size:12.5px!important;padding:3px 7px}
.modal .field{gap:2px}
.modal .field label{font-size:10px}
.modal h3{font-size:15px;font-weight:500;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.contract-viewer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;flex-direction:column}
.contract-viewer-bar{display:flex;align-items:center;gap:10px;background:#2a2a2a;padding:10px 16px;flex-shrink:0}
.contract-viewer-bar span{color:#fff;font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contract-viewer-frame{flex:1;border:none;background:#fff}
.comment-item{border:1px solid #e5e3de;border-radius:8px;padding:9px 12px;margin-bottom:6px;font-size:13px}
.comment-item .meta{font-size:11px;color:#666;margin-bottom:4px;display:flex;justify-content:space-between}
.link-box{display:flex;align-items:center;gap:8px;background:#f5f4f1;border-radius:8px;padding:8px 12px;font-size:11px;font-family:monospace;word-break:break-all;border:1px solid #e5e3de}
.wa-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;background:#25D366;color:#fff;font-size:12px;font-weight:500;text-decoration:none;border:none;cursor:pointer;font-family:inherit;white-space:nowrap}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:-1rem -1.25rem 12px -1.25rem;padding:10px 1.25rem;background:#9c9890;border-radius:12px 12px 0 0}
.sec-hdr h2{font-size:15px;font-weight:500;color:#fff}
.sec-hdr .btn{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)}
.sec-hdr .btn:hover{background:rgba(255,255,255,.25)}
.empty{text-align:center;padding:2.5rem;color:#666;font-size:13px}
.note-box{background:#f5f4f1;border-radius:6px;padding:8px 12px;font-size:12px;color:#555;border-left:3px solid #ED93B1;margin-top:6px}
.ev-card{border:1px solid #e5e3de;border-radius:10px;padding:12px 14px;margin-bottom:10px;background:#fff}
.list-tbl{width:100%;border-collapse:collapse;font-size:13px}
.list-tbl th{text-align:left;padding:7px 9px;font-size:11px;font-weight:700;color:#000;background:#f0eee8;border-bottom:1px solid #e0ddd4;text-transform:uppercase;letter-spacing:.03em}
.list-tbl td{padding:8px 9px;border-bottom:1px solid #e5e3de;vertical-align:middle}
.list-tbl tbody tr:nth-child(even) td{background:#f7f6f3}
.list-tbl tr:last-child td{border-bottom:none}
.list-tbl tr:hover td{background:#faf9f7;cursor:pointer}
.panel-wrap{display:flex;gap:14px;align-items:flex-start}
.cal-side{flex:1;min-width:0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;font-weight:600}
.detail-panel{width:340px;max-width:92vw;flex-shrink:0;background:#fff;border-left:1px solid #e5e3de;padding:1rem;position:fixed;top:0;right:0;bottom:0;z-index:60;overflow-y:auto;box-shadow:-6px 0 24px rgba(0,0,0,.18)}
.dp-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(20,18,14,.35);z-index:55}
.dp-section{border-top:1px solid #e5e3de;padding-top:10px;margin-top:10px}
.dp-section label{font-size:10.5px;color:#444;font-weight:600;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}

/* LOGIN */
.login-wrap{max-width:360px;margin:4rem auto;text-align:center;background:#fff;border-radius:16px;padding:2.5rem;border:1px solid #e5e3de}
.login-wrap .logo{font-size:40px;margin-bottom:16px}
.login-wrap h2{font-size:22px;font-weight:500;margin-bottom:6px}
.login-wrap p{color:#666;font-size:13px;margin:6px 0 24px}
.pin-in{text-align:center;font-size:24px;letter-spacing:8px;font-weight:500}

/* CALENDRIER */
.cal-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.cal-header .month-label{font-size:18px;font-weight:600;flex:1;text-align:center}
.cal-nav{padding:6px 12px;border-radius:8px;border:1px solid #d5d3ce;cursor:pointer;background:#fff;font-size:18px;color:#1a1a1a;line-height:1}
.cal-plus-btn{padding:6px 10px;border-radius:8px;border:1px solid #0055A4;background:#0055A4;color:#fff;font-size:18px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.cal-plus-btn:hover{background:#004080}
.cal-plus-btn-big{aspect-ratio:1;height:auto;align-self:stretch;border-radius:10px;border:1px solid #0055A4;background:#0055A4;color:#fff;font-size:26px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.cal-plus-btn-big:hover{background:#004080}
.cal-nav:hover{background:#f0eeea}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-radius:14px;overflow:hidden;border:1px solid #c9c5ba;background:#fff;position:relative;box-shadow:0 10px 30px -16px rgba(80,50,60,.32),0 1px 3px rgba(0,0,0,.04)}
.cal-grid.cal-anim{animation:calFade .4s cubic-bezier(.22,.61,.36,1) both}
@keyframes calFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cal-dow{background:linear-gradient(180deg,#f8f6f2,#efece5);text-align:center;padding:5px 2px;font-size:11px;font-weight:700;color:#1a1a1a;text-transform:uppercase;letter-spacing:.07em;border-right:1px solid #e7e4dc;border-bottom:1px solid #ddd9d0}
.cal-dow:nth-child(7n){border-right:none}
.cal-cell{background:#fff;min-height:124px;position:relative;cursor:pointer;padding:3px 3px 3px;border-right:1px solid #d8d4ca;border-bottom:1px solid #d8d4ca;transition:background .18s ease}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:#f7f5f1}
.cal-cell.other{background:#f8f7f4;opacity:.72}
.cal-cell.today{box-shadow:inset 0 0 0 2px #993556;z-index:2}
.cal-cell.vac-mid{background:#F3F0FF}
.cal-cell.vac-mid.other{background:#EEE9F8}
.cal-cell.vac-edge{background:#DDD6F8}
.cal-cell.vac-edge.other{background:#D5CDF0}
.cal-cell.pont{background:#E2DBF3}
.cal-cell.pont.other{background:#DAD2EC}
.cal-cell.ferie{background:#D2C7F0}
.cal-cell.ferie.other{background:#C7BAEA}
.day-num-wrap{display:flex;align-items:center;justify-content:space-between;gap:3px;padding:0 2px;margin-bottom:3px;flex-wrap:nowrap;overflow:hidden}
.day-num{font-size:13.5px;font-weight:600;color:#666;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center}
.cal-cell.today .day-num{color:#993556;font-weight:700}
.cal-cell.other .day-num{color:#bbb}
.cal-cell.vac-edge .day-num,.cal-cell.ferie .day-num{color:#3C3489;font-weight:700}
.day-tag{font-size:9px;font-weight:600;color:#534AB7;flex:0 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;line-height:1.2}
.bands-area{position:absolute;left:0;right:0;top:24px;bottom:2px;pointer-events:none}
.band{position:absolute;height:26px;font-size:9px;font-weight:600;cursor:pointer;pointer-events:all;z-index:2;padding:1px 4px;text-align:left;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:1px;overflow:hidden;box-shadow:0 1px 2px rgba(60,40,50,.14);transition:transform .12s ease,box-shadow .12s ease}
.band:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(60,40,50,.22);z-index:6!important}
.band .b-top{font-weight:500;font-size:9.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;line-height:13px}
.band .b-bottom{display:flex;justify-content:space-between;font-size:8px;font-weight:700;opacity:.95;line-height:10px}
.band-start{border-radius:0}
.band-end{border-radius:0}
.band-startend{border-radius:0;padding:0 5px}
.band-mid{border-radius:0}
/* Option = « tentative » : même couleur claire de domaine + rayures diagonales claires
   et liseré léger. Le texte reste foncé (comme les bandes confirmées). */
.band.option{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.62) 0,rgba(255,255,255,.62) 4px,rgba(255,255,255,0) 4px,rgba(255,255,255,0) 9px)!important;box-shadow:inset 0 0 0 1.5px rgba(90,60,70,.28),0 1px 2px rgba(60,40,50,.14)}
.band.option:hover{box-shadow:inset 0 0 0 1.5px rgba(90,60,70,.28),0 4px 10px rgba(60,40,50,.22)}
.b0f{background:#FF5CA6;color:#fff}
.b0l{background:#FBEAF0;color:#993556;border:1px dashed #F4C0D1}
.b1f{background:#FFB300;color:#fff}
.b1l{background:#FFF8E6;color:#BA8800;border:1px dashed #F5D98B}
.b2f{background:#43CB60;color:#fff}
.b2l{background:#EAF3DE;color:#3B6D11;border:1px dashed #C0DD97}
.b3f{background:#CECBF6;color:#3C3489}
.b3l{background:#EEEDFE;color:#534AB7;border:1px dashed #CECBF6}
.b4f{background:#B5D4F4;color:#0C447C}
.b4l{background:#E6F1FB;color:#185FA5;border:1px dashed #B5D4F4}
.leg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:7px;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#555}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid #c2bfb6;border-radius:10px;padding:6px 12px;margin-bottom:12px;transition:border-color .15s}
.search-bar:focus-within{border-color:#993556;box-shadow:0 0 0 3px rgba(153,53,86,.12)}
.search-bar input{border:none;background:transparent;outline:none;flex:1;font-size:13px;font-family:inherit;color:#1a1a1a}
.search-bar input::placeholder{color:#aaa}
.search-results{background:#fff;border:1px solid #e5e3de;border-radius:10px;margin-bottom:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.search-result-item{padding:10px 14px;border-bottom:1px solid #f0eeea;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .12s}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:#faf9f7}
.search-result-item .sr-name{font-weight:600;font-size:13px;flex:1}
.search-result-item .sr-meta{font-size:11px;color:#888;white-space:nowrap}
@media(max-width:640px){
  .app{padding:0.6rem 0.4rem}
  .topbar{padding:2px 0 4px;margin-bottom:4px}
  .tabs{margin-bottom:5px;padding:2px}
  .tab{padding:3px 1px;gap:1px}
  .tab .tab-ic{font-size:13px}
  .cal-header{margin-bottom:5px}
  .leg{margin-bottom:4px;gap:5px}
  .leg-item{font-size:10px}
  .band{font-size:10px}
  .cal-grid.compact-cell .cal-cell{min-height:75px}
  .detail-panel{width:100%;max-width:100vw}
  .g3{grid-template-columns:1fr 1fr}
  .list-tbl th:nth-child(5),.list-tbl td:nth-child(5){display:none}
  .clients-tbl th:nth-child(3),.clients-tbl td:nth-child(3){display:none} /* Société */
  .clients-tbl th:nth-child(5),.clients-tbl td:nth-child(5){display:none} /* Email */
  .clients-tbl th:nth-child(6),.clients-tbl td:nth-child(6){display:table-cell} /* Adresse : on la garde */
  .clients-tbl th:nth-child(7),.clients-tbl td:nth-child(7){display:none} /* Domaine */
  .liste-evt-tbl th:nth-child(5),.liste-evt-tbl td:nth-child(5){display:table-cell}
  .liste-evt-tbl th:nth-child(2),.liste-evt-tbl td:nth-child(2){display:none}
  .liste-evt-tbl th:nth-child(6),.liste-evt-tbl td:nth-child(6){display:none}
  .modal{padding:1rem;width:100%}
  .modal input,.modal select,.modal textarea{padding:3.5px 7px;line-height:1.1;font-size:12px!important}
  .modal .field{gap:2px}
  .modal .field label{font-size:9.5px;margin-bottom:0}
  .form-section{padding:7px 9px;margin-bottom:7px}
  .g2,.g3{gap:7px}
  .modal h3{margin-bottom:10px}

      'L\u2019accès à la piscine est autorisé exclusivement de 9h00 à 21h00. Le nombre maximal de personnes présentes simultanément dans l\u2019enceinte du bâtiment piscine est limité à dix (10). Un dispositif de sécurité est installé sur la porte d\u2019accès afin d\u2019en empêcher l\u2019ouverture par les jeunes enfants. La surveillance et la sécurité des enfants relèvent entièrement de la responsabilité du Preneur.'

    fetesAutorisees:true,
    equipements:'la piscine, le court de padel, les équipements sportifs, les jeux pour enfants ainsi que les installations intérieures et extérieures du Domaine',
    animauxForfait:50,
    gardien:{nom:'Misha',tel:'07 53 16 21 03'},
    seuilPenalite:3,

    piscinePeriode:'toute l\u2019année',
    reglement:[
      {h:'Usage général',p:[
        'Le Locataire s\u2019engage à jouir de la location de manière paisible et à en faire un usage conforme à la destination des lieux, à savoir une location de vacances et de réception privée. Le contrat de location est établi pour une capacité maximale conforme à celle prévue au contrat. Cette capacité ne pourra en aucun cas être dépassée, tant pour les hébergements que pour l\u2019utilisation des espaces communs et événements.',
        'Le jour du départ, l\u2019ensemble des lieux devra être rangé, les cuisines entièrement nettoyées, la vaisselle lavée et rangée, et les sacs poubelles fermés puis déposés dans les bacs prévus à cet effet. La libération complète des lieux devra intervenir au plus tard à l\u2019heure indiquée au contrat, sauf accord contraire expressément convenu.',
        'Il est strictement interdit de fumer à l\u2019intérieur de l\u2019ensemble des bâtiments. Les mégots ne devront en aucun cas être jetés au sol ou dans les espaces extérieurs de la propriété.',
        'Lors de toute sortie des gîtes ou bâtiments, même temporaire, le Locataire est tenu de fermer systématiquement les lieux à clé à l\u2019aide des clés fournies. En cas de non-respect de cette obligation, le Locataire assumera l\u2019entière responsabilité de tout vol, dégradation ou dommage survenu.',
        'Des extincteurs sont mis à disposition dans les bâtiments, ainsi qu\u2019une trousse de premiers secours située dans les cuisines. L\u2019utilisation de bougies, chandelles, lanternes à flamme, torches, braseros mobiles, fumigènes ou de toute source de flamme nue est strictement interdite à l\u2019intérieur des bâtiments ainsi qu\u2019à proximité immédiate des constructions, végétaux et espaces de réception, sauf autorisation écrite préalable du Propriétaire.'
      ]},
      {h:'Nettoyage',p:[
        'La propriété devra être rendue propre et rangée. Un état des lieux sera effectué en fin de séjour. En cas de non-respect de ces consignes, des frais de nettoyage supplémentaires pourront être appliqués.',
        'Sont inclus dans la prestation : le nettoyage des sols, salles de bain et WC ; le lavage et le repassage du linge de maison, les lits préparés à l\u2019arrivée.',
        'Le Locataire devra notamment : nettoyer les appareils électroménagers ainsi que le barbecue ; laver et ranger la vaisselle ; remettre en place les meubles et équipements déplacés ; fermer les sacs poubelles et les déposer dans les bacs prévus à cet effet.'
      ]},
      {h:'Wi-Fi / Accès internet',p:[
        'Un accès Internet Wi-Fi est mis gracieusement à disposition dans le Manoir et la Salle. Le Propriétaire ne saurait être tenu responsable en cas de dysfonctionnement, interruption ou perturbation du service. Toute utilisation illicite, contraire à l\u2019ordre public, aux bonnes mœurs ou portant atteinte aux droits des tiers est strictement interdite.'
      ]},
      {h:'La piscine',p:[
        'La piscine est chauffée toute l\u2019année (24/28°). Les horaires d\u2019accès (9h/22h) sont donnés à titre indicatif et peuvent être modifiés ou suspendus à la discrétion du Gardien pour des raisons de sécurité, de maintenance ou de comportement inapproprié. Il est interdit de courir, sauter, crier, manger, fumer ou consommer des boissons dans l\u2019espace piscine.',
        'Les enfants doivent être accompagnés en permanence par un adulte responsable. Les brassards sont obligatoires pour les enfants de moins de 7 ans.'
      ]},
      {h:'Terrasses, jardins et espaces extérieurs',p:[
        'Les équipements sportifs peuvent être utilisés de 9h à 22h. Les terrasses, salons de jardin et espaces de réception extérieurs sont accessibles de 9h à 23h. Les espaces extérieurs devront être laissés propres après utilisation.',
        'La tente et la terrasse principale située devant la salle de réception ne sont pas autorisées pour les animations bruyantes ou la diffusion musicale. Cet espace, ainsi que le parking, doivent rester calmes et silencieux, particulièrement à partir de 22h.',
        'Les attractions pour enfants sont à utiliser uniquement pour les enfants de 7 à 13 ans sous l\u2019entière responsabilité des parents.'
      ]},
      {h:'La salle de réception et la tente de réception',p:[
        'La salle constitue le seul espace autorisé pour les festivités et animations. Toute fête devra impérativement se dérouler à l\u2019intérieur de la salle, portes et fenêtres fermées. Le niveau sonore de la salle ne devra pas dépasser 90 dB dans la salle.',
        'La tente et la terrasse sont utilisables pour les cocktails de 11h à 22h dans une ambiance calme. Musique légère d\u2019ambiance tolérée. Pas de cris/chants. Les convives devront ensuite rejoindre la salle de réception.',
        'Aucun équipement audio extérieur n\u2019est autorisé sur les lieux (enceintes amplifiées, Bluetooth, connectées type Alexa/Google Home), sauf accord préalable du Propriétaire. Un point préalable avec le DJ ou le prestataire technique est obligatoire.',
        'Toute fête, musique ou animation est strictement interdite dans les chambres et hébergements.',
        'Les offices traiteur devront être intégralement nettoyés après utilisation et rendus dans leur état initial.'
      ]},
      {h:'Bruit et tranquillité du voisinage',p:[
        'Aucune fête, musique, animation, cri ou nuisance sonore n\u2019est autorisé à l\u2019extérieur des bâtiments ni dans les hébergements. À partir de 22h, toute activité devra se tenir exclusivement à l\u2019intérieur de la salle de réception, portes et fenêtres fermées, et le calme doit être quasiment absolu sur l\u2019ensemble de la propriété. Un agent de surveillance sera présent sur site lors de votre événement à partir de 22h pour faire maintenir le calme.',
        'L\u2019utilisation de feux d\u2019artifice, pétards, lanternes volantes, fumigènes ou de tout dispositif pyrotechnique est strictement interdite sur l\u2019ensemble de la propriété.',
        'En cas de nuisance sonore ou de non-respect des présentes règles, le Gardien du Domaine ou tout agent mandaté pourront intervenir à tout moment afin de faire cesser les troubles constatés.',
        'À compter de la 3ᵉ intervention du Gardien ou d\u2019un agent mandaté, une pénalité forfaitaire de 300 € par intervention supplémentaire pourra être appliquée et retenue sur le dépôt de garantie. En cas de manquement répété, les Propriétaires pourront faire interrompre immédiatement la fête ou la location, sans remboursement.'
      ]},
      {h:'Caution et responsabilité',p:[
        'Une caution d\u2019un montant de 3 000 € est demandée à l\u2019arrivée (chèque ou virement instantané). La remise des clés est conditionnée à son dépôt effectif.',
        'Tout sinistre, dommage, fuite, panne ou dégradation devra être signalé immédiatement au Propriétaire ou au Gardien. Après état des lieux de sortie, la caution sera restituée, déduction faite des éventuels frais de remise en état.',
        'Les retenues sur caution pourront notamment concerner : mobilier et décoration, équipements électroménagers et audiovisuels, équipements sportifs, installations sanitaires, espaces verts et équipements extérieurs, piscine et équipements associés, frais de nettoyage ou d\u2019intervention, pénalités liées au bruit.',
        'Le Locataire demeure financièrement responsable des dégradations, incidents ou nuisances causés par lui-même, ses invités ou prestataires, y compris au-delà du montant du dépôt de garantie.'
      ]},
      {h:'Responsabilité écologique',p:[
        'Des poubelles de tri sélectif sont mises à disposition. L\u2019eau et l\u2019énergie doivent être utilisées de manière raisonnable.',
        'La propriété étant équipée d\u2019une fosse septique, seul le papier hygiénique doit être jeté dans les WC. Toute obstruction des réseaux pourra entraîner des frais forfaitaires de 350 €.'
      ]},
      {h:'Parking',p:[
        'Les véhicules doivent être stationnés exclusivement sur le parking principal. La capacité maximale du parking est limitée à 40 véhicules.'
      ]},
      {h:'Contacts pendant le séjour',p:[
        'Le Gardien du Domaine : Misha – 07 53 16 21 03',
        'Les Propriétaires restent joignables si nécessaire : David – 06 20 14 33 22, Svitlana – 06 30 86 85 69'
      ]},
      {h:'Signature et acceptation',p:[
        'Les clés et accès au Domaine seront remis après le check-in et la signature des présentes.\n        Sans signature du règlement intérieur, aucune remise des clés ne sera effectuée.',
        'La signature du contrat de location vaut reconnaissance de la prise de connaissance et acceptation du présent règlement intérieur ainsi que des conditions générales de location.',
        'Le non-respect des consignes de sécurité, des engagements contractuels ou du présent règlement pourra entraîner l\u2019interruption immédiate de la location, sans remboursement.',
        'Le Locataire est responsable des personnes qui l\u2019accompagnent et se porte garant de leur comportement durant tout le séjour.'
      ]}
    ]
  },

    reglement:[
      {h:'Usage général',p:[
        'Le Locataire s\u2019engage à jouir de la location de manière paisible et à en faire un usage conforme à la destination des lieux, à savoir une location de vacances et de réception privée. Le contrat de location est établi pour une capacité maximale conforme à celle prévue au contrat.',
        'Le jour du départ, l\u2019ensemble des lieux devra être rangé, les cuisines entièrement nettoyées, la vaisselle lavée et rangée, et les sacs poubelles fermés puis déposés dans les bacs prévus à cet effet.',
        'Il est strictement interdit de fumer à l\u2019intérieur de l\u2019ensemble des bâtiments. Les mégots ne devront en aucun cas être jetés au sol ou dans les espaces extérieurs de la propriété.',
        'Lors de toute sortie des gîtes ou bâtiments, même temporaire, le Locataire est tenu de fermer systématiquement les lieux à clé. En cas de non-respect, le Locataire assumera l\u2019entière responsabilité de tout vol, dégradation ou dommage survenu.',
        'Des extincteurs sont mis à disposition dans les bâtiments, ainsi qu\u2019une trousse de premiers secours située dans les cuisines. L\u2019utilisation de flammes nues (bougies, lanternes, braseros, fumigènes…) est strictement interdite sauf autorisation écrite préalable.'
      ]},
      {h:'Nettoyage',p:[
        'La propriété devra être rendue propre et rangée. Un état des lieux sera effectué en fin de séjour.',
        'Sont inclus dans la prestation : le nettoyage des sols, salles de bain et WC ; le lavage et le repassage du linge de maison, les lits préparés à l\u2019arrivée.',
        'Le Locataire devra notamment : nettoyer les appareils électroménagers et le barbecue ; laver et ranger la vaisselle ; remettre en place les meubles déplacés ; fermer les sacs poubelles.'
      ]},
      {h:'Wi-Fi / Accès internet',p:[
        'Un accès Internet Wi-Fi est mis gracieusement à disposition dans le Manoir et la Salle. Le Propriétaire ne saurait être tenu responsable en cas de dysfonctionnement.'
      ]},
      {h:'La piscine',p:[
        'La piscine est chauffée de mai à septembre (24/28°). Les horaires d\u2019accès (9h/22h) sont donnés à titre indicatif. Il est interdit de courir, sauter, crier, manger, fumer ou consommer des boissons dans l\u2019espace piscine.',
        'Les enfants doivent être accompagnés en permanence par un adulte responsable. Les brassards sont obligatoires pour les enfants de moins de 7 ans.'
      ]},
      {h:'Terrasses, jardins et espaces extérieurs',p:[
        'Les équipements sportifs peuvent être utilisés de 9h à 22h. Les terrasses, salons de jardin et espaces de réception extérieurs sont accessibles de 9h à 23h.',
        'La terrasse située entre la salle de réception et le bassin/puits n\u2019est pas autorisée pour les cocktails, repas, animations ou diffusion musicale. Cet espace, ainsi que le parking, doivent rester calmes et silencieux à toute heure, particulièrement après 22h.',
        'Les attractions pour enfants sont à utiliser uniquement pour les enfants de 7 à 13 ans sous l\u2019entière responsabilité des parents.'
      ]},
      {h:'La salle de réception et la tente de réception',p:[
        'La salle constitue le seul espace autorisé pour les festivités et animations. Toute fête devra impérativement se dérouler à l\u2019intérieur de la salle, portes et fenêtres fermées. Le niveau sonore ne devra pas dépasser 90 dB dans la salle.',
        'La tente est utilisable pour les repas de 11h à 22h dans une ambiance calme. Musique légère d\u2019ambiance tolérée, pas de cris/chants. Fin effective d\u2019utilisation de la tente à 22h maximum, les convives devant ensuite rejoindre la salle de réception.',
        'Aucun équipement audio extérieur n\u2019est autorisé (enceintes amplifiées, Bluetooth, connectées), sauf accord préalable. Un point préalable avec le DJ ou le prestataire technique est obligatoire.',
        'Toute fête, musique ou animation est strictement interdite dans les chambres et hébergements.',
        'Les offices traiteur devront être intégralement nettoyés après utilisation et rendus dans leur état initial.'
      ]},
      {h:'Bruit et tranquillité du voisinage',p:[
        'Aucune fête, musique, animation, cri ou nuisance sonore n\u2019est autorisé à l\u2019extérieur des bâtiments ni dans les hébergements. À partir de 22h, toute activité devra se tenir exclusivement à l\u2019intérieur de la salle de réception, portes et fenêtres fermées, et le calme doit être quasiment absolu sur l\u2019ensemble de la propriété. Un agent de surveillance sera présent sur site à partir de 22h.',
        'L\u2019utilisation de feux d\u2019artifice, pétards, lanternes volantes, fumigènes ou de tout dispositif pyrotechnique est strictement interdite sur l\u2019ensemble de la propriété.',
        'En cas de nuisance sonore ou de non-respect des présentes règles, le Gardien du Domaine ou tout agent mandaté pourront intervenir à tout moment.',
        'À compter de la 3ᵉ intervention du Gardien ou d\u2019un agent mandaté, une pénalité forfaitaire de 300 € par intervention supplémentaire pourra être appliquée et retenue sur le dépôt de garantie. En cas de manquement répété, la fête ou la location pourra être interrompue immédiatement, sans remboursement.'
      ]},
      {h:'Caution et responsabilité',p:[
        'Une caution d\u2019un montant de 3 000 € est demandée à l\u2019arrivée (chèque ou virement instantané). La remise des clés est conditionnée à son dépôt effectif.',
        'Tout sinistre, dommage, fuite, panne ou dégradation devra être signalé immédiatement au Propriétaire ou au Gardien. Après état des lieux de sortie, la caution sera restituée, déduction faite des éventuels frais de remise en état.',
        'Les retenues sur caution pourront notamment concerner : mobilier et décoration, équipements électroménagers et audiovisuels, équipements sportifs, installations sanitaires, espaces verts, piscine, frais de nettoyage ou d\u2019intervention, pénalités liées au bruit.',
        'Le Locataire demeure financièrement responsable des dégradations, incidents ou nuisances causés par lui-même, ses invités ou prestataires, y compris au-delà du montant du dépôt de garantie.'
      ]},
      {h:'Responsabilité écologique',p:[
        'Des poubelles de tri sélectif sont mises à disposition. L\u2019eau et l\u2019énergie doivent être utilisées de manière raisonnable.',
        'La propriété étant équipée d\u2019une fosse septique, seul le papier hygiénique doit être jeté dans les WC. Toute obstruction des réseaux pourra entraîner des frais forfaitaires de 350 €.'
      ]},
      {h:'Parking',p:[
        'Les véhicules doivent être stationnés exclusivement sur le parking principal. La capacité maximale du parking est limitée à 70 véhicules.'
      ]},
      {h:'Contacts pendant le séjour',p:[
        'Le Gardien du Domaine : Sasha – 07 60 51 65 41',
        'Les Propriétaires restent joignables si nécessaire : David – 06 20 14 33 22, Svitlana – 06 30 86 85 69'
      ]},
      {h:'Signature et acceptation',p:[
        'Les clés et accès au Domaine seront remis après le check-in et la signature des présentes.\n        Sans signature du règlement intérieur, aucune remise des clés ne sera effectuée.',
        'La signature du contrat de location vaut reconnaissance de la prise de connaissance et acceptation du présent règlement intérieur ainsi que des conditions générales de location.',
        'Le non-respect des consignes de sécurité, des engagements contractuels ou du présent règlement pourra entraîner l\u2019interruption immédiate de la location, sans remboursement.',
        'Le Locataire est responsable des personnes qui l\u2019accompagnent et se porte garant de leur comportement durant tout le séjour.'
      ]}
    ]

      'Maison d\u2019une surface de 350 m² sur deux niveaux comprenant : cuisine équipée, 4 salons/salles à manger, 5 salles de bains et 7 toilettes, 9/12 chambres (capacité légale maximale : 15 personnes).',

    reglement:[
      {h:'USAGE GÉNÉRAL',p:[
        '1. Le Locataire s\u2019engage à jouir de la location de manière paisible et à en faire un usage conforme à la destination des lieux, à savoir une location de vacances et de réception privée. Le contrat de location est établi pour une capacité maximale de 15 personnes conforme à celle prévue au contrat. Cette capacité ne pourra en aucun cas être dépassée.',
        '2. Le jour du départ, l\u2019ensemble des lieux devra être rangé, les cuisines entièrement nettoyées, la vaisselle lavée et rangée, et les sacs poubelles fermés puis déposés dans les bacs prévus à cet effet.',
        '3. Il est strictement interdit de fumer à l\u2019intérieur de l\u2019ensemble des bâtiments. Les mégots ne devront en aucun cas être jetés au sol ou dans les espaces extérieurs.',
        '4. Lors de toute sortie, même temporaire, le Locataire est tenu de fermer systématiquement les lieux à clé. En cas de non-respect, le Locataire assumera l\u2019entière responsabilité de tout vol, dégradation ou dommage survenu.',
        '5. Des extincteurs sont mis à disposition dans les bâtiments, ainsi qu\u2019une trousse de premiers secours située dans les cuisines. L\u2019utilisation de flammes nues est strictement interdite sauf autorisation écrite préalable.'
      ]},
      {h:'NETTOYAGE',p:[
        '1. La propriété devra être rendue propre et rangée. Un état des lieux sera effectué en fin de séjour.',
        '2. Sont inclus dans la prestation : le nettoyage des sols, salles de bain et WC ; le lavage et le repassage du linge de maison, les lits préparés à l\u2019arrivée.',
        '3. Le Locataire devra notamment : nettoyer les appareils électroménagers et le barbecue ; laver et ranger la vaisselle ; remettre en place les meubles déplacés ; fermer les sacs poubelles.'
      ]},
      {h:'WI-FI / ACCÈS INTERNET',p:[
        '1. Un accès Internet Wi-Fi est mis gracieusement à disposition. Le Propriétaire ne saurait être tenu responsable en cas de dysfonctionnement.'
      ]},
      {h:'LA PISCINE',p:[
        '1. La piscine est chauffée d\u2019avril à octobre (24/28°). Les horaires d\u2019accès (9h/22h) sont donnés à titre indicatif. Il est interdit de courir, sauter, crier, manger, fumer ou consommer des boissons dans l\u2019espace piscine.',

function numberToFrenchWords(n){
  n=Math.round(n);
  if(n===0)return'zéro';
  const units=['','un','deux','trois','quatre','cinq','six','sept','huit','neuf','dix','onze','douze','treize','quatorze','quinze','seize','dix-sept','dix-huit','dix-neuf'];
  const tens=['','','vingt','trente','quarante','cinquante','soixante','soixante','quatre-vingt','quatre-vingt'];
  function under100(x){
    if(x<20)return units[x];
    const t=Math.floor(x/10),u=x%10;
    if(t===7||t===9){
      const base=tens[t];
      if(u===0)return base+'-dix';
      if(u===1&&t===7)return base+'-et-onze';
      return base+'-'+units[10+u];
    }
    let res=tens[t];
    if(u===1&&t!==8)res+='-et-un';
    else if(u===1&&t===8)res+='-un';
    else if(u>0)res+='-'+units[u];
    if(t===8&&u===0)res+='s';
    return res;
  }
  function under1000(x){
    const c=Math.floor(x/100),r=x%100;
    let res='';
    if(c>0){
      res+=(c===1?'cent':units[c]+' cent');
      if(c>1&&r===0)res+='s';
    }
    if(r>0)res+=(res?' ':'')+under100(r);
    return res;
  }
  const parts=[];
  const millions=Math.floor(n/1000000);
  const milliers=Math.floor((n%1000000)/1000);
  const reste=n%1000;
  if(millions>0)parts.push((millions===1?'un million':under1000(millions)+' millions'));
  if(milliers>0)parts.push((milliers===1?'mille':under1000(milliers)+' mille'));
  if(reste>0)parts.push(under1000(reste));
  return parts.join(' ')||'zéro';
}

function buildDateCellMap(y,m){
  const fd=new Date(y,m,1);let sd=fd.getDay();sd=sd===0?6:sd-1;
  const dim=new Date(y,m+1,0).getDate(),dip=new Date(y,m,0).getDate();
  const tc=Math.ceil((sd+dim)/7)*7;

  for(let i=0;i<tc;i++){
    let day,mo=m,yr=y;
    if(i<sd){day=dip-sd+i+1;mo=m-1;if(mo<0){mo=11;yr=y-1;}}
    else if(i>=sd+dim){day=i-sd-dim+1;mo=m+1;if(mo>11){mo=0;yr=y+1;}}
    else day=i-sd+1;
    dtc[`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`]={ci:i,col:i%7,row:Math.floor(i/7)};
  }

}
function buildBands(y,m){

     recoupement), donc un même jour peut voir une réservation partir et une autre arriver. Dans ce
     cas précis, on rapproche les deux représentations vers le milieu de journée en laissant 1h
     d'écart entre elles, pour qu'on distingue bien qu'il s'agit de deux réservations différentes. */
  const depByDomDate={},arrByDomDate={};

       On part du principe qu'il n'y a pas de recoupement de réservations sur un même domaine. */
    const slot=domIdx[r.domaine]||0;

      let sc='band-mid';

        else{mainParts.push(maxNb+' pers.');}

      const mainLine=mainParts.join(' · ');

      const _calName=PLATFORM_TYPES.includes(r.typeEvenement)?(r.typeEvenement+(_personName?' '+_personName:'')):_personName;

      const timeDep=ilr?(r.heureDepart||''):'';
      /* Heures pour position proportionnelle (fenêtre 8h-22h) */
      const hArr=ifr?(parseInt((r.heureArrivee||'12:00').split(':')[0])+(parseInt((r.heureArrivee||'12:00').split(':')[1]||0)/60)):8;
      const hDep=ilr?(parseInt((r.heureDepart||'12:00').split(':')[0])+(parseInt((r.heureDepart||'12:00').split(':')[1]||0)/60)):22;
      /* Représentation graphique façon TimeTree : par défaut, chaque réservation « remplit » sa
         journée de 8h à 21h à l'écran, quelle que soit l'heure réelle (qui reste affichée en texte
         via timeArr/timeDep). Exception : jour de relais avec une AUTRE réservation du même domaine

    });

      const lbl=el.closest&&el.closest('.field')&&el.closest('.field').querySelector('label');
      if(lbl){lbl.style.color='';lbl.style.textDecoration='';}
    });
    return;
  }
  // Champs contact à remplir (bordure rouge tant que vide)
  let contact;
  if(tc==='entreprise'){
    contact=['m-societe','m-adresse','m-tel','m-email'];
  } else {
    contact=['m-prenom1','m-nom1','m-tel','m-email','m-adresse'];
  }
  // Champs « cœur de réservation » toujours obligatoires (hors date/heure, gérées à part ci-dessous)
  const core=['m-evt','m-nbp','m-montant'];
  contact.concat(core).forEach(function(fid){
    const el=document.getElementById(fid);
    if(!el||el.type==='hidden')return;
    const cs=window.getComputedStyle(el);
    if(cs.visibility==='hidden'||cs.display==='none')return; // ignorer les champs masqués (ex. date de départ pour un déjeuner)
    const empty=!String(el.value||'').trim()||String(el.value).trim()==='À compléter';
    const lbl=el.closest&&el.closest('.field')&&el.closest('.field').querySelector('label');
    if(empty){
      el.style.borderColor='#CC0000';el.style.borderWidth='2px';el.style.background='#FFF3F2';
      if(lbl){lbl.style.color='#CC0000';lbl.style.textDecoration='underline dotted';}
    } else {
      el.style.borderColor='';el.style.borderWidth='';el.style.background='';
      if(lbl){lbl.style.color='';lbl.style.textDecoration='';}
    }
  });
  // Date d'arrivée / date de départ : rouge tant que vide OU jamais vue par un humain
  // (un remplissage automatique en cascade ne compte pas comme une vérification réelle).
  if(!S.rvwConfirm)S.rvwConfirm={};
  [['m-arr-date','arrDate'],['m-dep-date','depDate']].forEach(function(pair){
    const el=document.getElementById(pair[0]);
    if(!el)return;
    const cs=window.getComputedStyle(el);
    if(cs.visibility==='hidden'||cs.display==='none')return;
    const bad=!String(el.value||'').trim()||!S.rvwConfirm[pair[1]];
    const lbl=el.closest&&el.closest('.field')&&el.closest('.field').querySelector('label');
    if(bad){el.style.borderColor='#CC0000';el.style.borderWidth='2px';el.style.background='#FFF3F2';if(lbl){lbl.style.color='#CC0000';lbl.style.textDecoration='underline dotted';}}
    else{el.style.borderColor='';el.style.borderWidth='';el.style.background='';if(lbl){lbl.style.color='';lbl.style.textDecoration='';}}
  });
  // Les heures (partie heure seulement, pas les minutes) : rouge tant que non vues par un humain,
  // même si une heure par défaut a déjà été suggérée automatiquement.
  [['m-arr-heure-h','arrHeure'],['m-dep-heure-h','depHeure']].forEach(function(pair){
    const el=document.getElementById(pair[0]);
    if(!el)return;
    const cs=window.getComputedStyle(el);
    if(cs.visibility==='hidden'||cs.display==='none')return;
    const need=!S.rvwConfirm[pair[1]];
    const lbl=el.closest&&el.closest('.field')&&el.closest('.field').querySelector('label');
    if(need){el.style.borderColor='#CC0000';el.style.borderWidth='2px';el.style.background='#FFF3F2';if(lbl){lbl.style.color='#CC0000';lbl.style.textDecoration='underline dotted';}}
    else{el.style.borderColor='';el.style.borderWidth='';el.style.background='';if(lbl){lbl.style.color='';lbl.style.textDecoration='';}}

function adjustCalGridHeight(){
  const btnBig=document.querySelector('.cal-plus-btn-big');
  if(btnBig){
    const sib=btnBig.previousElementSibling;
    if(sib){const h=sib.getBoundingClientRect().height;if(h>0){btnBig.style.width=h+'px';btnBig.style.height=h+'px';}}
  }
  /* Façon TimeTree : le mois affiché doit toujours remplir la hauteur disponible du planning ET
     tenir dans l'écran, qu'il ait 4, 5 ou 6 lignes de semaines. On calcule la hauteur de case
     nécessaire, puis on en déduit la densité des bandes (hauteur/espacement) de façon proportionnelle,
     pour ne jamais faire déborder ni les 3 bandes de domaines, ni le calendrier hors de l'écran. */
  const inCalView=(S.view==='admin'&&S.tab==='calendrier')||(S.view==='presta'&&S.prestaTab==='calendrier');
  if(!inCalView)return;
  const grid=document.getElementById('cal-grid-main')||document.querySelector('.cal-grid');
  if(!grid)return;
  const cells=grid.querySelectorAll('.cal-cell');
  if(!cells.length)return;
  const numRows=Math.round(cells.length/7);
  if(!numRows)return;
  const dowEl=grid.querySelector('.cal-dow');
  const dowH=dowEl?dowEl.getBoundingClientRect().height:0;
  const gridTop=grid.getBoundingClientRect().top;
  const bottomMargin=18; // petite marge de respiration en bas de fenêtre
  const available=window.innerHeight-gridTop-dowH-bottomMargin;
  const isMobile=window.innerWidth<=640;
  // Tout le monde a désormais un affichage sur une seule ligne (David, Svitlana, prestataires) :
  // plus besoin de distinguer qui a besoin de plus de place. On applique le même réglage compact
  // à tous, pour que le mois entier tienne toujours sur un seul écran, ordinateur comme iPhone.
  const absFloor=isMobile?62:72;
  const cellCap=isMobile?9999:94;
  let cellH=Math.floor(available/numRows);
  if(cellH<absFloor)cellH=absFloor;
  if(cellH>cellCap)cellH=cellCap;
  cells.forEach(c=>{c.style.minHeight=cellH+'px';});
  // Densité des bandes déduite de la hauteur de case réellement obtenue.
  const offset=isMobile?21:22;
  let pitch=(cellH-offset)/3;
  // Le plancher de pitch est calé sur absFloor : 3×pitchMin+offset ne dépasse jamais absFloor,
  // donc jamais de débordement des 3 bandes de domaines, quelle que soit la taille d'écran.
  const pitchMin=isMobile?13:12;
  if(pitch<pitchMin)pitch=pitchMin;
  // Plafond aussi : sur un mois très aéré (4 semaines), on évite des bandes démesurément
  // grandes qui dénatureraient la mise en page — on garde un rendu propre et cohérent.
  const pitchMax=isMobile?20:19;
  if(pitch>pitchMax)pitch=pitchMax;
  // La case peut être plus grande (plus d'air), mais la bande, elle, garde toujours la même
  // taille — l'espace en plus reste simplement visible en dessous, sans jamais agrandir la bande.
  const bandH=Math.max(isMobile?12:11,Math.round(pitch-3));
  window.__bandSizing={offset,pitch,bandH};
  // Numéros de semaine à gauche, alignés sur chaque ligne du mois.
  const weekCol=document.getElementById('week-num-col');
  if(weekCol){
    const fd0=new Date(S.calYear,S.calMonth,1);
    let sd0=fd0.getDay();sd0=sd0===0?6:sd0-1;
    const firstMonday=new Date(S.calYear,S.calMonth,1-sd0);
    const wkFont=isMobile?8:9;
    let html=`<div style="height:${dowH}px"></div>`;
    for(let i=0;i<numRows;i++){
      const rowMonday=new Date(firstMonday.getTime()+i*7*86400000);
      html+=`<div style="height:${cellH}px;display:flex;align-items:flex-start;justify-content:center;padding-top:3px;font-size:${wkFont}px;color:#aaa;font-weight:600">${isoWeekNum(rowMonday)}</div>`;
    }
    weekCol.innerHTML=html;
  }
}
function isoWeekNum(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const dayNum=(d.getUTCDay()+6)%7;
  d.setUTCDate(d.getUTCDate()-dayNum+3);
  const firstThursday=new Date(Date.UTC(d.getUTCFullYear(),0,4));
  const fdDayNum=(firstThursday.getUTCDay()+6)%7;
  firstThursday.setUTCDate(firstThursday.getUTCDate()-fdDayNum+3);
  return 1+Math.round((d-firstThursday)/(7*86400000));
}
function injectBands(){
  const inCalView=(S.view==='admin'&&S.tab==='calendrier')||(S.view==='presta'&&S.prestaTab==='calendrier');
  if(!inCalView)return;
  const grid=document.getElementById('cal-grid-main');if(!grid)return;
  const cells=grid.querySelectorAll('.cal-cell');if(!cells.length)return;
  const{bands}=buildBands(S.calYear,S.calMonth);
  const gridRect=grid.getBoundingClientRect();
  const dayFrac=h=>Math.max(0,Math.min(1,(h-7)/15));
  const placed=[];
  bands.forEach(b=>{
    const startIdx=b.row*7+b.colStart,endIdx=b.row*7+b.colStart+b.spanCols-1;
    const startCell=cells[startIdx],endCell=cells[endIdx];
    if(!startCell||!endCell)return;
    const sRect=startCell.getBoundingClientRect(),eRect=endCell.getBoundingClientRect();
    const cellW=sRect.width;
    let leftPx,widthPx;
    /* Positionnement proportionnel continu sur la largeur réelle (en pixels) de la grille :
       - la journée visible va de 8h à 22h (14h) — pas d'horaires avant 8h ni après 22h
       - case arrivée : part de hArr, s'étire jusqu'au bord droit de la DERNIÈRE case du segment
       - cases milieu : pleine largeur du segment
       - case départ : part du bord gauche du segment, finit à hDep
       - case unique (startend) : de hArr à hDep dans la même case */
    if(b.shapeClass==='band-startend'){
      /* Case unique (jour unique OU réservation de 2 jours qui tient dans une même ligne du
         calendrier) : on va de l'heure visuelle d'arrivée à l'heure visuelle de départ — 9h→21h
         par défaut, resserré à 14h→13h s'il y a un relais avec une autre réservation ce jour-là. */
      leftPx=(sRect.left-gridRect.left)+dayFrac(b.visA)*cellW;
      const rightPx=(eRect.left-gridRect.left)+dayFrac(b.visD)*cellW;
      widthPx=Math.max(rightPx-leftPx,6);
    } else if(b.shapeClass==='band-start'){
      leftPx=(sRect.left-gridRect.left)+dayFrac(b.visA)*cellW;
      widthPx=(eRect.left+eRect.width-gridRect.left)-leftPx;
    } else if(b.shapeClass==='band-end'){
      leftPx=(sRect.left-gridRect.left);
      const rightPx=(eRect.left-gridRect.left)+dayFrac(b.visD)*cellW;
      widthPx=Math.max(rightPx-leftPx,6);
    } else {
      leftPx=(sRect.left-gridRect.left);
      widthPx=(eRect.left+eRect.width-gridRect.left)-leftPx;
    }
    const _isMobileNow=window.innerWidth<=640;
    const _bs=window.__bandSizing||{offset:_isMobileNow?21:22,pitch:_isMobileNow?20:19,bandH:_isMobileNow?17:16};
    const _pitch=_bs.pitch,_offTop=_bs.offset,_bandH=_bs.bandH;
    const topPx=(sRect.top-gridRect.top)+_offTop+(b.slot*_pitch);
    const timeArrF0=fmtHeureCourt(b.timeArr),timeDepF0=fmtHeureCourt(b.timeDep);
    /* On grignote un peu le début/la fin de la bande colorée (uniquement sur les jours où elle a
       une vraie arrivée/un vrai départ) pour loger l'heure réelle juste devant/juste derrière,
       en petit et discret — jamais à l'intérieur de la bande. L'heure d'arrivée est légèrement
       décalée vers le haut, l'heure de départ légèrement vers le bas (pas centrées). Pas d'heure
       affichée pour les repas (déjeuner/dîner) : ça n'apporte rien pour ce type d'événement. */
    const _hourMargin=13;
    const _showArrLbl=!b.isMeal&&(b.shapeClass==='band-start'||b.shapeClass==='band-startend')&&!!timeArrF0;
    const _showDepLbl=!b.isMeal&&(b.shapeClass==='band-end'||b.shapeClass==='band-startend')&&!!timeDepF0;
    let _renderLeft=leftPx,_renderWidth=widthPx;
    const _minBandW=26;
    let _applyArr=_showArrLbl,_applyDep=_showDepLbl;
    if(_applyArr||_applyDep){
      const _shrink=(_applyArr?_hourMargin:0)+(_applyDep?_hourMargin:0);
      if(widthPx-_shrink<_minBandW){_applyArr=false;_applyDep=false;} // pas assez de place : on garde la bande pleine largeur
      else{
        if(_applyArr){_renderLeft+=_hourMargin;_renderWidth-=_hourMargin;}
        if(_applyDep){_renderWidth-=_hourMargin;}
      }
    }
    const div=document.createElement('div');
    div.className=`band ${b.shapeClass} ${b.bandCls}${b.optCls}${b.isPaid?' paid':''}`;
    div.style.position='absolute';
    div.style.top=topPx+'px';
    div.style.left=_renderLeft+'px';
    div.style.width=Math.max(10,_renderWidth)+'px';
    // La police suit la densité calculée : plus la case est compacte (mois à 6 semaines,
    // petit écran), plus le texte se resserre légèrement, sans jamais descendre sous le lisible.
    const _fs=_isMobileNow?Math.max(7.5,Math.min(8.5,_bandH-4)):Math.max(8,Math.min(9,_bandH-6));
    div.style.height=_bandH+'px';div.style.fontSize=_fs+'px';div.style.padding='0 4px';
    if(b.optCls)div.style.color='#1a1a1a';
    const timeArrF=timeArrF0,timeDepF=timeDepF0;
    let label;
    const _cornerColor=b.optCls?'#1a1a1a':'#8a8678';
    if(STRIP_BAND_INFO){
      label=(timeArrF||timeDepF)?`<div class="b-bottom" style="justify-content:center;gap:6px;font-size:9px">${timeArrF?`<span>${timeArrF}</span>`:''}${(timeArrF&&timeDepF)?'<span>→</span>':''}${timeDepF?`<span>${timeDepF}</span>`:''}</div>`:'';
    } else {
      const topParts=[];
      if(b.nameTxt){
        const isPrestaView=S.view==='presta';
        // Anneau acompte — admin seulement
        const DOT_COLORS=['#72243E','#7A5800','#27500A','#3C3489','#0C447C'];
        const dotColor=DOT_COLORS[b.colorIdx||0];
        const dotHtml=(!isPrestaView&&b.isPartPaid)?`<svg width="12" height="12" viewBox="0 0 12 12" style="display:inline-block;vertical-align:middle;margin-right:3px;flex-shrink:0"><circle cx="6" cy="6" r="5.5" fill="${dotColor}"/><circle cx="6" cy="6" r="3" fill="white"/></svg>`:'';
        // Payé intégralement — badge € fond rouge (admin seulement)
        const fullHtml=(!isPrestaView&&b.isPaid)?`<span style="display:inline-flex;align-items:center;justify-content:center;width:12px;height:12px;background:#CC0000;color:#fff;border-radius:50%;font-size:8px;font-weight:800;margin-right:3px;flex-shrink:0;line-height:1">€</span>`:'';
        // Badge P bleu ciel — prestataire non-ménage assigné
        const pSvg=`<svg width="13" height="13" viewBox="0 0 13 13" style="display:inline-block;vertical-align:middle;margin-left:2px;flex-shrink:0"><circle cx="6.5" cy="6.5" r="6" fill="none" stroke="#2E86C1" stroke-width="1.5"/><text x="6.5" y="9.5" text-anchor="middle" font-size="7.5" font-weight="700" fill="#2E86C1" font-family="Arial,sans-serif">P</text></svg>`;
        const pBadge=b.hasPresta?pSvg:'';
        if(isPrestaView){
          topParts.push('<span style="font-weight:800">'+b.nameTxt+'</span>');
        } else {
          const nameStyle='font-weight:800'+(b.incompleteContact?';text-decoration:underline dotted #FFE066;text-decoration-thickness:1.5px;text-underline-offset:2px':'');
          topParts.push(dotHtml+fullHtml+'<span style="'+nameStyle+'">'+b.nameTxt+'</span>');
        }
      }
      if(b.mainLine)topParts.push(b.mainLine);
      const topLine=topParts.join(' · ');
      const isAdminSimplified=true;
      if(isAdminSimplified){
        // Affichage simplifié pour tout le monde (David, Svitlana, Misha, Sacha…) : tout sur une
        // seule ligne, sans horaires ni badge P à l'intérieur de la bande elle-même — pour rester
        // compact et garder le nom / paiement bien visibles. Les horaires réels restent affichés,
        // mais juste avant/juste après la bande colorée (voir plus bas), pas à l'intérieur.
        label=topLine?`<div class="b-top" style="white-space:nowrap">${topLine}</div>`:'';
      } else {
      const showP=b.hasPresta&&(S.view!=='presta'||(S.presta&&(S.presta.id==='p1'||S.presta.id==='p2')));
      const pTxt=showP?'<span style="display:inline-flex;align-items:center;justify-content:center;width:10px;height:10px;border:1.2px solid #2E86C1;border-radius:50%;color:#2E86C1;font-weight:700;font-size:7px;line-height:1;flex-shrink:0;margin-left:2px">P</span>':'';
      // Durée réelle du séjour
      const _rFull=D.reservations.find(function(x){return x.id===b.rid;});
      var _durTot=99;
      if(_rFull&&_rFull.dateArrivee&&_rFull.dateDepart){
        const _dA=new Date(_rFull.dateArrivee+'T'+(_rFull.heureArrivee||'12:00')+':00');
        const _dD=new Date(_rFull.dateDepart+'T'+(_rFull.heureDepart||'12:00')+':00');
        _durTot=(_dD-_dA)/3600000;
      }
      if(_durTot<5){
        // <5h : 100%/anneau + nom + arrF + P (pas depF, pas nb/type)
        label=(topLine||timeArrF)?`<div class="b-top">${topLine}</div><div class="b-bottom"><span>${timeArrF}${pTxt}</span></div>`:'';
      } else {
        // ≥5h : affichage complet
        label=(topLine||timeArrF||timeDepF)?`<div class="b-top">${topLine}</div><div class="b-bottom"><span>${timeArrF}${pTxt}</span><span>${timeDepF}</span></div>`:'';
      }
      }
    }
    div.innerHTML=label;
    div.title=label.replace(/<\/(div|span)>/g,' ').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim()+' — cliquer pour détail';
    if(!STRIP_BAND_INFO)div.onclick=ev=>{ev.stopPropagation();selectResa(b.rid,ev);};
    else div.style.cursor='default';
    grid.appendChild(div);
    if(_applyArr){
      const lblA=document.createElement('div');
      lblA.style.position='absolute';lblA.style.top=(topPx-1)+'px';lblA.style.left=leftPx+'px';lblA.style.width=_hourMargin+'px';lblA.style.height=_bandH+'px';
      lblA.style.display='flex';lblA.style.alignItems='flex-start';lblA.style.justifyContent='flex-end';lblA.style.paddingRight='1px';lblA.style.boxSizing='border-box';
      lblA.style.fontWeight='700';lblA.style.color=_cornerColor;lblA.style.pointerEvents='none';lblA.style.zIndex='3';lblA.style.overflow='hidden';
      const _hIdxA=timeArrF0.indexOf('h');
      lblA.innerHTML=_hIdxA>=0?`<span style="font-size:7px">${timeArrF0.slice(0,_hIdxA)}</span><span style="font-size:5px">${timeArrF0.slice(_hIdxA)}</span>`:`<span style="font-size:7px">${timeArrF0}</span>`;
      grid.appendChild(lblA);
    }
    if(_applyDep){
      const lblD=document.createElement('div');
      lblD.style.position='absolute';lblD.style.top=(topPx+1)+'px';lblD.style.left=(_renderLeft+Math.max(10,_renderWidth))+'px';lblD.style.width=_hourMargin+'px';lblD.style.height=_bandH+'px';
      lblD.style.display='flex';lblD.style.alignItems='flex-end';lblD.style.justifyContent='flex-start';lblD.style.paddingLeft='1px';lblD.style.boxSizing='border-box';
      lblD.style.fontWeight='700';lblD.style.color=_cornerColor;lblD.style.pointerEvents='none';lblD.style.zIndex='3';lblD.style.overflow='hidden';
      const _hIdxD=timeDepF0.indexOf('h');
      lblD.innerHTML=_hIdxD>=0?`<span style="font-size:7px">${timeDepF0.slice(0,_hIdxD)}</span><span style="font-size:5px">${timeDepF0.slice(_hIdxD)}</span>`:`<span style="font-size:7px">${timeDepF0}</span>`;
      grid.appendChild(lblD);
    }
    placed.push({rid:b.rid,slot:b.slot,row:b.row,leftPx,widthPx,topPx});
  });
  /* Avertissement de chevauchement : deux réservations différentes, même créneau (slot/ligne), qui se touchent ou se croisent dans le temps */
  const bySlotRow={};
  placed.forEach(p=>{const k=p.row+'_'+p.slot;(bySlotRow[k]=bySlotRow[k]||[]).push(p);});
  Object.values(bySlotRow).forEach(arr=>{
    arr.sort((a,b)=>a.leftPx-b.leftPx);
    for(let i=0;i<arr.length-1;i++){
      const a=arr[i],b2=arr[i+1];
      if(a.rid===b2.rid)continue;
      if(a.leftPx+a.widthPx>b2.leftPx+0.5){
        const warn=document.createElement('div');
        warn.style.position='absolute';
        warn.style.top=(Math.min(a.topPx,b2.topPx))+'px';
        warn.style.left=(b2.leftPx-1.5)+'px';
        warn.style.width='3px';
        warn.style.height='26px';
        warn.style.background='#E11D2A';
        warn.style.zIndex='5';
        warn.style.borderRadius='2px';
        warn.style.boxShadow='0 0 3px rgba(225,29,42,.7)';
        warn.title='⚠️ Chevauchement : ces deux réservations se croisent dans le temps';
        grid.appendChild(warn);
      }
    }
  });
}

function injectVisiteMarkers(){
  const inCalView=(S.view==='admin'&&S.tab==='calendrier')||(S.view==='presta'&&S.prestaTab==='calendrier');
  if(!inCalView)return;
  // Pas de visites pour Dominique
  if(S.presta&&S.presta.id==='p4')return;
  const grid=document.getElementById('cal-grid-main');if(!grid)return;
  const cells=grid.querySelectorAll('.cal-cell');if(!cells.length)return;
  const{dtc}=buildDateCellMap(S.calYear,S.calMonth);
  const domIdx={};D.domaines.forEach((d,i)=>domIdx[d.id]=i);
  const gridRect=grid.getBoundingClientRect();
  /* Bandes déjà posées par injectBands, pour éviter de superposer une visite sur une réservation */
  const existingBands=Array.from(grid.querySelectorAll('.band')).map(el=>({left:parseFloat(el.style.left),width:parseFloat(el.style.width),top:parseFloat(el.style.top)}));
  const _isMobileNowV=window.innerWidth<=640;
  const _bsV=window.__bandSizing||{offset:_isMobileNowV?21:22,pitch:_isMobileNowV?20:19};
  const _pitchV=_bsV.pitch,_offV=_bsV.offset;
  const markerD=Math.max(15,Math.min(22,Math.round((_bsV.bandH||20)*0.85))); // diamètre du rond
  const gap=3;
  const bgColors=['#FF5CA6','#FFB300','#43CB60','#6B64C8','#3A7AB8'];
  /* On regroupe les visites par jour + domaine : plutôt que de les placer sous leur heure réelle
     (ce qui les fait se chevaucher si les heures sont proches), on les centre en groupe dans la
     case et on les répartit régulièrement de part et d'autre du centre. Peu importe qu'un rond
     ne soit plus exactement sous son heure — l'important, c'est que chaque visite reste visible
     et distincte des autres. */
  const groups={};
  D.visites.filter(v=>(!CAL_DOMAIN_FILTER||CAL_DOMAIN_FILTER.includes(v.domaine))&&!(S.hiddenDomains||[]).includes(v.domaine)).forEach(v=>{
    if(!v.date||!dtc[v.date])return;
    const key=v.date+'|'+v.domaine;
    (groups[key]=groups[key]||[]).push(v);
  });
  Object.keys(groups).forEach(key=>{
    const list=groups[key].sort((a,b)=>(a.heure||'').localeCompare(b.heure||''));
    const v0=list[0];
    const cellInfo=dtc[v0.date];const cell=cells[cellInfo.ci];if(!cell)return;
    const slot=domIdx[v0.domaine]||0;
    const cRect=cell.getBoundingClientRect();
    const cellLeft=cRect.left-gridRect.left;
    const cellRight=cellLeft+cRect.width;
    const cellCenter=cellLeft+cRect.width/2;
    const rowTopPx=(cRect.top-gridRect.top)+_offV+(slot*_pitchV);
    const n=list.length;
    const totalW=n*markerD+(n-1)*gap;
    let startX=cellCenter-totalW/2;
    if(startX<cellLeft+1)startX=cellLeft+1;
    if(startX+totalW>cellRight-1)startX=Math.max(cellLeft+1,cellRight-1-totalW);
    list.forEach((v,i)=>{
      let leftPx=startX+i*(markerD+gap);
      /* Anti-collision avec une bande de réservation sur la même ligne */
      const collide=existingBands.find(b=>Math.abs(b.top-rowTopPx)<4&&leftPx>=b.left-markerD&&leftPx<=b.left+b.width+markerD);
      if(collide){
        const proposedRight=collide.left+collide.width+4;
        leftPx=(proposedRight<cellRight-markerD)?proposedRight:Math.max(cellLeft+2,collide.left-markerD-4);
      }
      const dom=gDom(v.domaine);const c=dom.color||0;
      const cancelled=v.status==='annulée';
      const heureLbl=(v.heure||'').split(':')[0]||'';
      const div=document.createElement('div');
      div.style.position='absolute';div.style.left=leftPx+'px';div.style.top=rowTopPx+'px';div.style.zIndex='4';div.style.cursor='pointer';
      div.style.width=markerD+'px';div.style.height=markerD+'px';
      div.title=`Visite — ${v.client||''} ${v.heure||''}${cancelled?' (annulée)':''}`;
      div.onclick=ev=>{ev.stopPropagation();openM('editVisite',v.id);};
      div.innerHTML=`<div style="width:100%;height:100%;border-radius:50%;background:${bgColors[c]};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;overflow:hidden;${cancelled?'opacity:.55':''}">
        <span style="font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;font-size:${markerD<=17?8:9}px;font-weight:800;color:#fff;line-height:1;${cancelled?'text-decoration:line-through':''}">${heureLbl}</span>
      </div>`;
      grid.appendChild(div);
    });
  });
}

              :_showColor?('color:'+_dd.s+';font-weight:700'):'';

  }

  return`<div class="panel-wrap">

const ARR_DEFAULT_HOUR={0:'17:00',1:'10:00',2:'10:00',3:'10:00',4:'10:00',5:'17:00',6:'10:00'};
const DEP_DEFAULT_HOUR={0:'17:00',1:'18:00',2:'18:00',3:'18:00',4:'18:00',5:'17:00',6:'18:00'};
function syncHeureField(prefix){
  const h=(document.getElementById(prefix+'-h')||{}).value||'';
  const m=(document.getElementById(prefix+'-m')||{}).value||'00';
  const hidden=document.getElementById(prefix);
  if(hidden)hidden.value=h?(h+':'+m):'';
}
function setHeureSelects(prefix,val){
  const parts=(val||'').split(':');
  const h=parts[0]||'',m=parts[1]||'00';
  const elH=document.getElementById(prefix+'-h'),elM=document.getElementById(prefix+'-m'),elHidden=document.getElementById(prefix);
  if(elH)elH.value=h;
  if(elM)elM.value=m;
  if(elHidden)elHidden.value=val||'';
}
function defaultArrHeure(dateStr){
  if(!dateStr)return;
  const dow=new Date(dateStr+'T12:00:00').getDay();
  setHeureSelects('m-arr-heure',ARR_DEFAULT_HOUR[dow]||'');
}
function defaultDepDate(dateStr){
  if(!dateStr)return;
  const elDep=document.getElementById('m-dep-date');
  if(elDep&&!elDep.value){
    const d=new Date(dateStr+'T12:00:00');
    const dow=d.getDay(); // 5=vendredi
    // Vendredi → dimanche (+2j), sinon +2j par défaut
    const daysToAdd=(dow===5)?2:2;
    d.setDate(d.getDate()+daysToAdd);
    elDep.value=d.toISOString().slice(0,10);
    refreshAllGardNights();defaultDepHeure(elDep.value);
  }
}
function defaultDepHeure(dateStr){
  if(!dateStr)return;
  const depDow=new Date(dateStr+'T12:00:00').getDay();
  const arrEl=document.getElementById('m-arr-date');
  const arrDow=arrEl?new Date((arrEl.value||dateStr)+'T12:00:00').getDay():-1;
  if(arrDow===5&&depDow===0){setHeureSelects('m-dep-heure','17:00');}
  else{setHeureSelects('m-dep-heure',DEP_DEFAULT_HOUR[depDow]||'');}
}

function renderDernieres(){
  /* On ne montre que les vraies actions humaines : création de fiche, ajout de commentaire,
     ajout de prestation, ajout/modification de paiement ou de montant. Pas les petites
     modifications de champs (téléphone, email…) ni les événements automatiques. */
  const SHOW={'créée':1,'commentaire':1,'paiement':1,'prestation':1};
  const items=(D.activityLog||[])
    .filter(it=>SHOW[it.action]&&it.rid&&D.reservations.some(x=>x.id===it.rid))
    .sort((a,b)=>b.ts-a.ts).slice(0,20);
  const rows=items.map(it=>{
    const d=new Date(it.ts);
    const when=(it.ts>1)?(d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})):'—';
    const isCreation=it.action==='créée';
    const r=it.rid?D.reservations.find(x=>x.id===it.rid):null;
    const dom=gDom(it.domaine||(r&&r.domaine));
    const name=r?(displayClientName(r)||'—'):'—';
    const arr=r?(r.dateArrivee||''):'';
    const badgeLabel=isCreation?'✚ Nouvelle résa':'✎ Résa modifiée';
    const badgeColor=isCreation?'#27500A':'#993556';
    const badgeBg=isCreation?'#EAF3DE':'#FBEAF0';
    const detail=isCreation?'Création de la fiche':(it.label||'—');
    const author=it.authorName||'';
    const line2=isCreation?(`Création de la fiche · ${author?author+' · ':''}${when}`):(`Modification · ${author?author+' · ':''}${when} : ${detail}`);
    const clickAttr=r?`onclick="openM('editResa','${r.id}')"`:'';
    const cursorCss=r?'cursor:pointer;':'';
    return`<div ${clickAttr} style="${cursorCss}padding:10px 12px 10px 13px;border-bottom:2px solid #efece5;border-left:4px solid ${badgeColor};transition:background .12s" onmouseover="this.style.background='#faf9f7'" onmouseout="this.style.background=''">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="background:${badgeBg};color:${badgeColor};font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0">${badgeLabel}</span>
        <span style="font-weight:700;font-size:13px;white-space:nowrap">${name}</span>

function nightsByMonth(r){
  const as=r.dateArrivee||r.date,ds2=r.dateDepart||r.dateArrivee||r.date;
  const isJ=as===ds2;
  const counts={};
  if(isJ){
    counts[as.slice(0,7)]=1;
  } else {
    let cur=new Date(as+'T12:00:00');const fin=new Date(ds2+'T12:00:00');
    while(cur<fin){const key=dstr(cur).slice(0,7);counts[key]=(counts[key]||0)+1;cur=addDays(cur,1);}
  }
  return counts;
}
function montantForMonth(r,y,m){
  const counts=nightsByMonth(r);
  const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  const key=`${y}-${String(m+1).padStart(2,'0')}`;
  const inMonth=counts[key]||0;
  return(r.montant||0)*(inMonth/total);
}
function paidForMonth(r,y,m){
  const counts=nightsByMonth(r);
  const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  const key=`${y}-${String(m+1).padStart(2,'0')}`;
  const inMonth=counts[key]||0;
  return totPay(r)*(inMonth/total);
}
function montantForYear(r,y){
  const counts=nightsByMonth(r);const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  let inY=0;Object.entries(counts).forEach(([k,n])=>{if(k.startsWith(y+'-'))inY+=n;});
  return(r.montant||0)*(inY/total);
}
function paidForYear(r,y){
  const counts=nightsByMonth(r);const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  let inY=0;Object.entries(counts).forEach(([k,n])=>{if(k.startsWith(y+'-'))inY+=n;});
  return totPay(r)*(inY/total);
}

        <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><span class="pill ${PILL[dom.color||0]}">${dom.name}</span><span style="color:#888;font-size:12px;white-space:nowrap">${ds(l.date||r.dateArrivee)}</span>
          <input type="text" value="${l.label||''}" placeholder="Intitulé" onchange="updPrestaLine('${r.id}','${p.id}','${l.id}','label',this.value)" style="flex:1;min-width:90px;font-size:13px;font-weight:500;padding:3px 5px">
          <button class="btn btn-xs btn-danger" onclick="delPrestaLine('${r.id}','${p.id}','${l.id}')">✕</button>
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:nowrap">
          <input type="number" value="${l.montant||''}" onchange="updPrestaLine('${r.id}','${p.id}','${l.id}','montant',this.value)" style="width:70px;font-size:12px;padding:3px 5px;font-weight:500">
          <select onchange="updPrestaLine('${r.id}','${p.id}','${l.id}','paidDirect',this.value)" style="font-size:10.5px;padding:2px 2px;flex-shrink:0;width:auto;max-width:95px">
            <option value="0" ${!l.paidDirect?'selected':''}>Payé via nous</option>
            <option value="1" ${l.paidDirect?'selected':''}>Payé direct au presta</option>
          </select>
          <input type="text" value="${l.notes||''}" placeholder="Note" onchange="updPrestaLine('${r.id}','${p.id}','${l.id}','notes',this.value)" style="flex:1;min-width:0;font-size:12px;padding:3px 5px">
        </div>
      </div>`;}).join('')}
    </div>`;
  }

  /* === Dominique (jardinage) === */
  let dominiqueSection='';
  if(p.name==='Dominique'){
    const rows=[...D.dominiqueSchedule].filter(x=>inMonth(x.date)).sort((a,b)=>a.date.localeCompare(b.date));
    const total=rows.reduce((a,x)=>a+(x.montant||0),0);
    const paid=rows.filter(x=>x.paid).reduce((a,x)=>a+(x.montant||0),0);
    dominiqueSection=`<div style="background:#fff;border:1px solid #e5e3de;border-radius:12px;padding:1rem 1.25rem;margin-bottom:14px">
      <div class="sec-hdr"><h2>🌱 Planning de ${p.name} — ${MONTHS_FR[m]} ${y}</h2><button class="btn btn-xs btn-primary" onclick="openM('dominiquePlanning')">Gérer le planning</button></div>
      <div class="g3" style="margin-bottom:10px">
        <div class="metric"><span class="lbl">Total dû ce mois</span><span class="val">${money(total)}</span></div>
        <div class="metric"><span class="lbl">Réglé</span><span class="val" style="color:#27500A">${money(paid)}</span></div>
        <div class="metric"><span class="lbl">Reste à régler</span><span class="val" style="color:#A32D2D">${money(total-paid)}</span></div>
      </div>
      ${rows.length===0?'<div class="empty">Aucune journée programmée ce mois-ci.</div>':''}
      ${rows.map((x,xIdx)=>{const dom=gDom(x.domaine);return`<div style="padding:6px 8px;margin:0 -8px;border-bottom:1px solid #e5e3de;font-size:13px;background:${xIdx%2===1?'#f7f6f3':'transparent'}">
        <div style="margin-bottom:4px"><span class="pill ${PILL[dom.color||0]}" style="margin-right:6px">${dom.name}</span>${dn(x.date)} ${ds(x.date)}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="text" value="${x.comment||''}" placeholder="Commentaire" onchange="updDominiquePlanningComment('${x.id}',this.value)" style="flex:1;min-width:0;font-size:12px;padding:3px 5px;color:#888">
          <strong style="white-space:nowrap">${money(x.montant)}</strong>
          <span class="pill" style="background:${x.paid?'#E8F3E0':'#FCEBEB'};color:${x.paid?'#27500A':'#791F1F'};cursor:pointer;flex-shrink:0" onclick="toggleDominiquePlanningPaid('${x.id}')">${x.paid?'✓ Réglé':'✗ Régler'}</span>
        </div>
      </div>`;}).join('')}
    </div>`;
  }

  const allEmpty=!menageSection&&!gardeSection&&!commSection&&!dominiqueSection;
  return`<div style="margin-top:16px">${nav}${menageSection}${gardeSection}${commSection}${dominiqueSection}${allEmpty?`<div class="empty">Aucun suivi financier spécifique pour ${p.name}.</div>`:''}</div>`;
}

function updClientTel(rid,val){
  const r=D.reservations.find(x=>x.id===rid);if(!r)return;
  const v=(val||'').trim();
  if(v&&!isValidPhone(v)){alert("Numéro de téléphone invalide. En France : 10 chiffres commençant par 0 (ex. 06 12 34 56 78). À l'étranger : commencez par + ou 00 suivi de l'indicatif.");render();return;}
  r.tel=v||'À compléter';
  saveD();showMsg('Téléphone enregistré ✓');
}
function updClientField(rid,field,val){
  const r=D.reservations.find(x=>x.id===rid);if(!r)return;
  const v=(val||'').trim();
  if(field==='email')r.email=v;
  else if(field==='societe')r.societe=v;
  else if(field==='adresse')r.adresse=v;
  else if(field==='nom1'){r.nom1=v;r.client=[r.prenom1,r.nom1].filter(Boolean).join(' ').trim()||v;}
  else if(field==='prenom1'){r.prenom1=v;r.client=[r.prenom1,r.nom1].filter(Boolean).join(' ').trim()||r.nom1||'';}
  else if(field==='nom2')r.nom2=v;
  else if(field==='prenom2')r.prenom2=v;
  saveD();showMsg('Enregistré ✓');
}
function clientCellInput(rid,field,value,missing,ph){
  const safe=(value||'').replace(/"/g,'&quot;');

}
function clientRow(r,dom){

    :clientCellInput(r.id,'nom1',r.nom1,nomMissing,'Nom');

    ?'<div style="display:flex;flex-direction:column;gap:3px">'+clientCellInput(r.id,'prenom1',r.prenom1,false,'Prénom')+'<div style="opacity:.75">'+clientCellInput(r.id,'prenom2',r.prenom2,false,'Prénom (2)')+'</div></div>'

function getLastBackupInfo(){
  try{const raw=localStorage.getItem('lastBackupExport');return raw?JSON.parse(raw):null;}catch(e){return null;}
}
function markBackupDone(){
  try{localStorage.setItem('lastBackupExport',JSON.stringify({date:dstr(new Date()),ts:Date.now()}));}catch(e){}
}
function daysSinceBackup(){
  const info=getLastBackupInfo();
  if(!info)return null;
  return Math.floor((Date.now()-info.ts)/86400000);
}
function renderExport(){
  const days=daysSinceBackup();
  const info=getLastBackupInfo();

  if(days===null){
    alertHtml=`<div class="alert" style="background:#FCEBEB;color:#791F1F">⚠️ Aucune sauvegarde Excel n'a encore été faite. Il est recommandé d'en faire une dès maintenant, puis une fois par semaine.</div>`;
  } else if(days>=7){
    alertHtml=`<div class="alert" style="background:#FCEBEB;color:#791F1F">⚠️ Dernière sauvegarde Excel il y a ${days} jours (${fmt(info.date)}). Pense à en refaire une.</div>`;
  } else {
    alertHtml=`<div class="alert alert-ok">✓ Dernière sauvegarde Excel il y a ${days} jour${days>1?'s':''} (${fmt(info.date)}).</div>`;
  }
  return`<div style="background:#fff;border:1px solid #e5e3de;border-radius:12px;padding:1rem 1.25rem;margin-bottom:14px">
    <div class="sec-hdr"><h2>💾 Export Excel / Sauvegarde</h2></div>

      <strong>Recommandation :</strong> télécharge ce fichier une fois par semaine et conserve-le (email à toi-même, clé USB, Drive…). En cas de problème avec le site, tu ne perds ainsi jamais plus d'une semaine d'organisation.
    </div>
    <button class="btn btn-primary" style="padding:10px 18px;font-size:13px;margin-right:8px" onclick="exportExcel('date')">📥 Télécharger l'Excel (par dates de séjour)</button>
    <button class="btn btn-primary" style="padding:10px 18px;font-size:13px" onclick="exportExcel('modif')">🕒 Télécharger l'Excel (par dernières modifications)</button>
    <div style="margin-top:18px;font-size:11px;color:#888">Le fichier contient un onglet "Réservations" avec une ligne par séjour, et un onglet "Clients" avec les coordonnées. Il s'ouvre avec Excel, Google Sheets ou Numbers.<br>Le tri "par dernières modifications" place en haut les réservations créées ou modifiées le plus récemment — pratique pour repérer vite ce qui a changé dans la semaine.</div>
  </div>
  <div style="background:#fff;border:1px solid #e5e3de;border-radius:12px;padding:1rem 1.25rem">

    <div style="font-size:13px;color:#555;margin-bottom:14px;line-height:1.5">
      Si la base de données en ligne est perdue ou inaccessible, tu peux réinjecter ici un fichier Excel exporté précédemment depuis ce logiciel. Toutes les réservations qu'il contient seront recréées.<br>
      <span style="color:#A32D2D;font-weight:600">⚠️ Attention : cette opération ajoute les réservations du fichier à celles déjà présentes. Si tu restaures après une perte totale, les données actuelles seront simplement complétées (pas de doublons si tu restaures un fichier déjà importé).</span>

}
