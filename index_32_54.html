    if(!txt)return'';
    // Passages en gras rouge — formules de sanction / interruption / caution
    txt=txt.replace(/(Sans signature du règlement intérieur[^.]*\.)/gi,'<strong style="color:#B22222;font-size:11pt">$1</strong>');
    txt=txt.replace(/(Le non-respect des consignes[^.]*sans remboursement\.)/gi,'<strong style="color:#B22222">$1</strong>');
    txt=txt.replace(/(l['']interruption immédiate de la location, sans remboursement)/gi,'<strong style="color:#B22222">$1</strong>');
    txt=txt.replace(/(La remise des clés est conditionnée[^.]+\.)/gi,'<strong>$1</strong>');
    txt=txt.replace(/(pénalité forfaitaire de 300 €[^.]*\.)/gi,'<strong style="color:#B22222">$1</strong>');
    txt=txt.replace(/(frais forfaitaires de 350 €)/gi,'<strong style="color:#B22222">$1</strong>');
    // Passages en gras simple — obligations du locataire
    txt=txt.replace(/(l['']ensemble des lieux devra être rangé[^.]*cet effet\.)/gi,'<strong>$1</strong>');
    txt=txt.replace(/(Les brassards sont obligatoires pour les enfants de moins de 7 ans\.)/gi,'<strong>$1</strong>');
    txt=txt.replace(/(strictement interdit[^.]*\.)/gi,'<strong>$1</strong>');
    txt=txt.replace(/(90 dB)/g,'<strong style="color:#B22222">90 dB</strong>');
    txt=txt.replace(/(60 dB)/g,'<strong style="color:#B22222">60 dB</strong>');
    return txt;

function downloadContractPdf(rid){
  const r=D.reservations.find(x=>x.id===rid);if(!r)return;
  // Figer la date du contrat à la première génération
  if(!r.contratDate){r.contratDate=dstr(new Date());saveD();}
  const cd=CONTRACT_DATA[r.domaine]||CONTRACT_DATA.d1;
  const html=generateContractHtml(r);
  const baseName=contractFileName(r,cd,'pdf').replace(/\.pdf$/,'');
  // Ouvrir la visionneuse
  S._contractHtml=html;
  S._contractName=baseName;
  S._contractRid=rid;
  S._contractFileName=baseName+'.pdf';
  S.modal={type:'contractViewer'};
  render();
}
function _savePdfFromHtml(html,fileName){
  if(typeof html2pdf!=='undefined'){
    const div=document.createElement('div');
    div.style.cssText='position:fixed;left:-9999px;top:0;width:210mm;background:#fff;';
    div.innerHTML=html;
    document.body.appendChild(div);
    html2pdf().set({
      margin:[12,10,12,10],
      filename:fileName,
      image:{type:'jpeg',quality:.95},
      html2canvas:{scale:2,useCORS:true,letterRendering:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    }).from(div).save().finally(()=>document.body.removeChild(div));
  } else {
    // Fallback : télécharger comme fichier HTML consultable
    _downloadAsHtml(html,fileName.replace(/\.pdf$/,'.html'));
  }
}
function _downloadAsHtml(html,fileName){
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=fileName;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

function base64ToUint8Array(base64Data){
  const base64=base64Data.split(',')[1]||base64Data;
  const binary=atob(base64);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  return bytes;
}
async function downloadContractDocx(rid){
  const r=D.reservations.find(x=>x.id===rid);if(!r)return;
  if(!r.contratDate){r.contratDate=dstr(new Date());saveD();}
  if(typeof docx==='undefined'){alert('La librairie Word ne s\u2019est pas chargée (connexion internet nécessaire). Réessaie dans quelques secondes.');return;}
  const{sections,cd,partiesData}=buildContractSections(r);
  const{Document,Packer,Paragraph,TextRun,AlignmentType,ImageRun,BorderStyle,ShadingType}=docx;
  const themeColor=(cd.couleur||'#8B5A4A').replace('#','');
  const themeLight=(cd.couleurClaire||'#F7F0DF').replace('#','');
  const children=[];

  /* Logo */
  if(cd.logo){
    try{
      const imgBytes=base64ToUint8Array(cd.logo);
      children.push(new Paragraph({alignment:AlignmentType.CENTER,children:[new ImageRun({data:imgBytes,transformation:{width:120,height:120},type:'png'})],spacing:{after:140}}));
    }catch(e){}
  }

  /* Titre contrat */
  children.push(new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:'CONTRAT DE LOCATION DE VACANCES',bold:true,size:34,color:themeColor,allCaps:true})],spacing:{after:60}}));
  children.push(new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:`${cd.nomDomaine}  ·  ${cd.adresseSite}`,italics:true,size:19,color:'888888'})],spacing:{after:320},border:{bottom:{style:BorderStyle.THICK,size:8,color:themeColor,space:8}}}));

  /* Parties en encarts côte à côte (simulés en tableau) */
  function partyParagraphs(label,party){
    const out=[];
    out.push(new Paragraph({children:[new TextRun({text:label,bold:true,size:17,color:themeColor,allCaps:true,characterSpacing:40})],spacing:{before:60,after:30}}));
    out.push(new Paragraph({children:[new TextRun({text:party.nom,bold:true,size:25,color:'1A1A1A'})],spacing:{after:30}}));
    party.lignes.forEach(l=>out.push(new Paragraph({children:[new TextRun({text:l,size:19,color:'555555'})],spacing:{after:16}})));
    return out;
  }
  partyParagraphs('Le Bailleur',partiesData.bailleur).forEach(p=>children.push(p));
  children.push(new Paragraph({text:'',spacing:{after:80}}));
  partyParagraphs('Le Preneur',partiesData.preneur).forEach(p=>children.push(p));
  children.push(new Paragraph({text:'',spacing:{after:240},border:{bottom:{style:BorderStyle.SINGLE,size:4,color:'CCCCCC',space:6}}}));

  /* Helper: rend une ligne avec passages critiques en gras/rouge */
  function lineToRuns(line){
    const RED='B22222';
    const patterns=[
      {re:/(Sans signature du règlement intérieur[^.]*\.)/gi,bold:true,color:RED},
      {re:/(Le non-respect des consignes[^.]*sans remboursement\.)/gi,bold:true,color:RED},
      {re:/(l['']interruption immédiate de la location, sans remboursement)/gi,bold:true,color:RED},
      {re:/(pénalité forfaitaire de 300 €[^.]*\.)/gi,bold:true,color:RED},
      {re:/(frais forfaitaires de 350 €)/gi,bold:true,color:RED},
      {re:/(90 dB)/g,bold:true,color:RED},
      {re:/(60 dB)/g,bold:true,color:RED},
      {re:/(l['']ensemble des lieux devra être rangé[^.]*cet effet\.)/gi,bold:true,color:'1A1A1A'},
      {re:/(Les brassards sont obligatoires[^.]+\.)/gi,bold:true,color:'1A1A1A'},
      {re:/(La remise des clés est conditionnée[^.]+\.)/gi,bold:true,color:'1A1A1A'},
      {re:/(strictement interdit[^.]*\.)/gi,bold:true,color:'1A1A1A'},
    ];
    const runs=[];
    // Extraire le numéro en début de ligne (ex: "4.1. " ou "1. ")
    const numMatch=line.match(/^(\d+(?:\.\d+)*\.)\s/);
    let rest=line;
    if(numMatch){
      runs.push(new TextRun({text:numMatch[1]+' ',bold:true,color:themeColor,size:22}));
      rest=line.slice(numMatch[0].length);
    }
    // Tokenise le reste selon les patterns d'emphase
    let segments=[{text:rest,bold:false,color:'2A2A2A'}];
    patterns.forEach(({re,bold,color})=>{
      const newSegs=[];
      segments.forEach(seg=>{
        if(seg.bold){newSegs.push(seg);return;}
        let last=0,m;re.lastIndex=0;
        while((m=re.exec(seg.text))!==null){
          if(m.index>last)newSegs.push({text:seg.text.slice(last,m.index),bold:false,color:seg.color});
          newSegs.push({text:m[0],bold,color});
          last=m.index+m[0].length;
        }
        if(last<seg.text.length)newSegs.push({text:seg.text.slice(last),bold:false,color:seg.color});
      });
      segments=newSegs;
    });
    segments.forEach(s=>runs.push(new TextRun({text:s.text,bold:s.bold,color:s.color,size:21})));
    return runs;
  }

  /* Sections du contrat */
  const mainSections=sections.slice(3,-1);
  mainSections.forEach(s=>{
    if(s.h)children.push(new Paragraph({
      children:[new TextRun({text:s.h.toUpperCase(),bold:true,size:22,color:themeColor,characterSpacing:20})],
      spacing:{before:280,after:100},
      border:{bottom:{style:BorderStyle.SINGLE,size:6,color:themeColor,space:4}}
    }));
    s.p.forEach(line=>{
      if(line==='')children.push(new Paragraph({text:'',spacing:{after:80}}));
      else children.push(new Paragraph({children:lineToRuns(line),spacing:{after:60},alignment:AlignmentType.JUSTIFIED}));
    });
  });

  /* Zone signature */
  children.push(new Paragraph({children:[new TextRun({text:'Réalisé en 2 exemplaires originaux.',italics:true,size:19,color:'888888'})],spacing:{before:320,after:280}}));
  children.push(new Paragraph({
    tabStops:[{type:'right',position:9000}],
    children:[new TextRun({text:'Le Preneur',bold:true,size:21}),new TextRun({text:'\t'}),new TextRun({text:'David et Svitlana GONSON — Les Domaines de D.S',bold:true,size:21})],
    spacing:{after:700}
  }));
  children.push(new Paragraph({
    tabStops:[{type:'right',position:9000}],
    children:[new TextRun({text:'Signature précédée de « lu et approuvé » — Date :',size:19,color:'888888'}),new TextRun({text:'\t'}),new TextRun({text:`Signature — Date : ${dateLong(r.contratDate||dstr(new Date()))}`,size:19,color:'888888'})]
  }));

  /* ══ ANNEXE RÈGLEMENT INTÉRIEUR ══ */
  if(cd.logo){
    try{
      const imgBytes2=base64ToUint8Array(cd.logo);
      children.push(new Paragraph({alignment:AlignmentType.CENTER,pageBreakBefore:true,children:[new ImageRun({data:imgBytes2,transformation:{width:85,height:85},type:'png'})],spacing:{after:120}}));
    }catch(e){children.push(new Paragraph({pageBreakBefore:true,text:''}));}
  } else {
    children.push(new Paragraph({pageBreakBefore:true,text:''}));
  }
  children.push(new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:'RÈGLEMENT INTÉRIEUR',bold:true,size:30,color:themeColor,allCaps:true})],spacing:{after:50}}));
  children.push(new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:cd.nomDomaine,italics:true,size:20,color:'888888'})],spacing:{after:300},border:{bottom:{style:BorderStyle.THICK,size:8,color:themeColor,space:8}}}));

  buildAnnexSections(r).forEach(s=>{
    if(!s.h&&!s.p.length)return;
    if(s.h){
      /* Tous les titres en bandeau couleur domaine, texte blanc */
      children.push(new Paragraph({
        children:[new TextRun({text:s.h.toUpperCase(),bold:true,size:20,color:'FFFFFF',characterSpacing:60})],
        spacing:{before:260,after:100},
        shading:{type:ShadingType.SOLID,color:themeColor},
        indent:{left:160,right:160}
      }));
    }
    s.p.forEach(line=>{
      if(!line)children.push(new Paragraph({text:'',spacing:{after:60}}));
      else children.push(new Paragraph({children:lineToRuns(line),spacing:{after:55},alignment:AlignmentType.JUSTIFIED}));
    });
  });
  children.push(new Paragraph({children:[new TextRun({text:'Nom, date et signature précédée de la mention « lu et approuvé »',italics:true,size:19,color:'888888'})],spacing:{before:360},border:{top:{style:BorderStyle.DASHED,size:4,color:'CCCCCC',space:6}}}));

  const doc=new Document({
    styles:{default:{document:{run:{font:'Georgia',size:21}}}},
    sections:[{properties:{page:{size:{width:11906,height:16838},margin:{top:1080,right:1080,bottom:1080,left:1080}}},children}]
  });
  const blob=await Packer.toBlob(doc);
  const url=URL.createObjectURL(blob);
  const w=window.open(url,'_blank');
  if(!w){
    const a=document.createElement('a');
    a.href=url;a.download=contractFileName(r,cd,'docx');
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    return;
  }
  setTimeout(()=>URL.revokeObjectURL(url),60000);
}

      'Date départ':r.dateDepart||'',
      'Heure départ':r.heureDepart||'',
      'Couchages':r.nbPersonnes||r.nbAdultes||'',
      'Enfants':r.nbEnfants||'',
      'Invités soirée':r.nbSoiree||'',
      'Montant total €':r.montant||0,
      'Total payé €':totPay(r),
      'Reste à payer €':(r.montant||0)-totPay(r),
      'Détail paiements':(r.paiements||[]).map(p=>`${p.date}:${p.montant}€${p.note?' ('+p.note+')':''}`).join(' | '),
      'Ménage prévu pour':mi?mi.name:'',

      'Ménage réglé':r.menagePaid?'Oui':'Non',
      'Prestataires assignés (IDs)':(r.prestataires||[]).join(','),
      'Prestataires assignés (noms)':prestaNames,
      'Note interne':r.noteInterne||'',
      'Commande caviste':r.caviste||'',
      'Prestataires extérieurs':(r.prestasExterieurs||[]).map(x=>`${x.intitule}${x.montant?' - '+x.montant+'€':''}${x.note?' / '+x.note:''}`).join(' | ')
    };
  });
  const clientRows=[...D.reservations].filter(r=>r.client||r.societe).sort((a,b)=>(a.client||'').localeCompare(b.client||'','fr',{sensitivity:'base'})).map(r=>{
    const dom=gDom(r.domaine);
    return{
      'Nom':r.client||'',
      'Société':r.typeClient==='entreprise'?(r.societe||''):'',
      'Téléphone':displayTel(r.tel)||'',
      'Email':r.email||'',
      'Domaine':dom.name,
      'Date arrivée':r.dateArrivee||'',
      'Type événement':r.typeEvenement||''
    };
  });
  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.json_to_sheet(resaRows);
  const ws2=XLSX.utils.json_to_sheet(clientRows);
  XLSX.utils.book_append_sheet(wb,ws1,'Réservations');
  XLSX.utils.book_append_sheet(wb,ws2,'Clients');
  const today=dstr(new Date());
  const suffix=sortMode==='modif'?'par_modif':'par_dates';
  XLSX.writeFile(wb,`Domaines_Normandie_export_${suffix}_${today}.xlsx`);
  markBackupDone();
  showMsg('Export Excel téléchargé ✓');
}

function handleRestoreFile(input){
  const file=input.files&&input.files[0];
  if(!file)return;
  const statusEl=document.getElementById('restore-status');
  if(statusEl)statusEl.innerHTML='<span style="color:#666;font-size:13px">Lecture du fichier…</span>';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const sheet=wb.Sheets['Réservations']||wb.Sheets[wb.SheetNames[0]];
      if(!sheet)throw new Error("Aucune feuille 'Réservations' trouvée dans le fichier.");
      const rows=XLSX.utils.sheet_to_json(sheet,{defval:''});
      if(!rows.length)throw new Error('Le fichier ne contient aucune ligne de réservation.');
      const domByName={};D.domaines.forEach(d=>domByName[d.name]=d.id);
      let added=0,updated=0,skipped=0;
      rows.forEach(row=>{
        const id=String(row['ID']||'').trim();
        if(!id){skipped++;return;}
        const domaine=domByName[row['Domaine']]||D.domaines[0].id;
        const tel=row['Téléphone']&&row['Téléphone']!=='À renseigner'?String(row['Téléphone']):'';
        const paiements=[];
        if(row['Détail paiements']){
          String(row['Détail paiements']).split('|').forEach(seg=>{
            const m=seg.trim().match(/^(\d{4}-\d{2}-\d{2}):([\d.]+)€(?:\s*\((.*)\))?$/);
            if(m)paiements.push({id:gid(),date:m[1],montant:parseFloat(m[2])||0,note:m[3]||''});
          });
        }
        const prestataires=row['Prestataires assignés (IDs)']?String(row['Prestataires assignés (IDs)']).split(',').map(s=>s.trim()).filter(Boolean):[];
        const rebuilt={
          id,
          domaine,
          status:row['Statut']||'confirmé',
          client:row['Client']||'',
          societe:row['Société']||'',
          typeClient:row['Type client']==='Entreprise'?'entreprise':'particulier',
          tel,
          email:row['Email']||'',
          typeEvenement:row['Type événement']||'',
          dateArrivee:row['Date arrivée']||'',
          heureArrivee:row['Heure arrivée']||'',
          dateDepart:row['Date départ']||row['Date arrivée']||'',
          heureDepart:row['Heure départ']||'',
          nbPersonnes:parseInt(row['Couchages'])||0,
          nbEnfants:parseInt(row['Enfants'])||0,
          nbSoiree:parseInt(row["Invités soirée"])||0,
          montant:parseFloat(row['Montant total €'])||0,
          menagePaid:row['Ménage réglé']==='Oui',
          prestataires,
          noteInterne:row['Note interne']||'',
          caviste:row['Commande caviste']||'',
          prestasExterieurs:[],
          paiements,
          commentaires:[],
          prestaLines:{},
          prestaGarde:{}
        };
        const existing=D.reservations.find(x=>x.id===id);
        if(existing){
          Object.assign(existing,rebuilt,{paiements:existing.paiements&&existing.paiements.length?existing.paiements:paiements,commentaires:existing.commentaires||[],prestaLines:existing.prestaLines||{},prestaGarde:existing.prestaGarde||{},prestasExterieurs:existing.prestasExterieurs||[]});
          updated++;
        } else {
          D.reservations.push(rebuilt);
          added++;
        }
      });
      saveD();
      if(statusEl)statusEl.innerHTML=`<div class="alert alert-ok">✓ Restauration terminée : ${added} réservation(s) recréée(s), ${updated} mise(s) à jour${skipped?', '+skipped+' ligne(s) ignorée(s) (sans ID)':''}.</div>`;
      render();
    }catch(err){
      if(statusEl)statusEl.innerHTML=`<div class="alert" style="background:#FCEBEB;color:#791F1F">❌ Erreur lors de la lecture du fichier : ${err.message}</div>`;
    }
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

function renderGardePlanningCalendar(p){
  const y=S.calYear,m=S.calMonth,todayStr=dstr(new Date());
  const{tc,sd,dim,dip}=buildDateCellMap(y,m);
  const nightsByDate={};
  D.reservations.filter(r=>r.status!=='annulé').forEach(r=>{
    const pg=(r.prestaGarde||{})[p.id];if(!pg)return;
    Object.entries(pg.nights||{}).forEach(([date,v])=>{nightsByDate[date]={domaine:pg.domaine,duree:v.duree};});
  });
  (D.gardeSchedule||[]).filter(x=>x.pid===p.id).forEach(x=>{nightsByDate[x.date]={domaine:x.domaine,duree:x.duree};});
  let gridHtml=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let ci=0;ci<tc;ci++){
    let day,mo=m,yr=y,isO=false;
    if(ci<sd){day=dip-sd+ci+1;mo=m-1;if(mo<0){mo=11;yr=y-1;}isO=true;}
    else if(ci>=sd+dim){day=ci-sd-dim+1;mo=m+1;if(mo>11){mo=0;yr=y+1;}isO=true;}
    else day=ci-sd+1;
    const ds3=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const n=nightsByDate[ds3];
    let cls='cal-cell';if(isO)cls+=' other';if(ds3===todayStr)cls+=' today';
    const dom=n?gDom(n.domaine):null;
    const marker=n?`<div style="margin-top:6px;padding:4px 5px;border-radius:6px;background:${LEG_BG[dom.color||0]};font-size:10px;font-weight:700;text-align:center;line-height:1.3">${dom.name}<br>${n.duree==='courte'?'Courte':'Longue'}</div>`:'';
    gridHtml+=`<div class="${cls}"><div class="day-num-wrap"><span class="day-num">${day}</span></div>${marker}</div>`;
  }
  return`<div class="cal-header" style="margin-bottom:10px">${monthYearPicker('calYear','calMonth')}</div>
  <div class="leg">${D.domaines.map(d=>`<span class="leg-item"><span class="leg-dot" style="background:${LEG_BG[d.color||0]}"></span>${d.name}</span>`).join('')}</div>
  <div class="cal-grid">${gridHtml}</div>`;
}

function resizeImageFile(file,maxDim,callback){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
      else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      callback(canvas.toDataURL('image/jpeg',0.72));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

  // Svitlana ne voit pas Mathilde/Sébastien dans son formulaire : on préserve leur affectation existante
  // telle quelle, pour ne jamais l'effacer simplement parce que leur case n'apparaît pas chez elle.
  const _isSvitSave=S.admin&&S.admin.id==='a2';
  if(_isSvitSave&&origR){
    const _hiddenIds=D.prestataires.filter(p=>p.name==='Mathilde'||p.name==='Sébastien').map(p=>p.id);
    _hiddenIds.forEach(hid=>{if((origR.prestataires||[]).includes(hid)&&!prestataires.includes(hid))prestataires.push(hid);});
  }
  const prestaGarde={};
  D.prestataires.forEach(p=>{
    if(!prestataires.includes(p.id))return;
    if(_isSvitSave&&(p.name==='Mathilde'||p.name==='Sébastien')){
      // Champs invisibles pour Svitlana : on reprend tel quel ce qui existait déjà.
      if(origR&&origR.prestaGarde&&origR.prestaGarde[p.id])prestaGarde[p.id]=origR.prestaGarde[p.id];
      return;
    }
    if(p.inputMode==='garde'){
      const domSel=document.getElementById('pgdom-'+p.id);
      const nights={};
      document.querySelectorAll(`.gard-chk[data-presta="${p.id}"]`).forEach(chk=>{
        if(chk.checked){
          const sel=document.querySelector(`.gard-sel[data-presta="${p.id}"][data-date="${chk.dataset.date}"]`);
          const duree=sel?sel.value:'longue';
          const prevNight=origR&&origR.prestaGarde&&origR.prestaGarde[p.id]&&origR.prestaGarde[p.id].nights&&origR.prestaGarde[p.id].nights[chk.dataset.date];
          nights[chk.dataset.date]={duree,paid:(prevNight&&prevNight.paid)||false,payMethod:(prevNight&&prevNight.payMethod)||''};
        }
      });
      if(domSel&&Object.keys(nights).length)prestaGarde[p.id]={domaine:domSel.value,nights};
    }
  });
  const missing=[];
  if(!domaine)missing.push('le domaine');
  if(!dateArrivee)missing.push("la date d'arrivée");
  if(!dateDepart)missing.push('la date de départ');
  if(!heureArrivee)missing.push("l'heure d'arrivée");
  if(!heureDepart)missing.push("l'heure de départ");
  if(typeClient==='entreprise'){
    if(!nom1)missing.push('le nom du contact');
    if(!societe)missing.push('la raison sociale de la société');
  } else {
    if(!nom1)missing.push('le nom du client 1');
  }
  if(!typeEvenement)missing.push("le type d'événement");
  if(!nbPersonnes&&typeEvenement!=='Gratuit'&&typeEvenement!=='Déjeuner / Dîner')missing.push('le nombre de couchages');
  if(!montant&&typeEvenement!=='Gratuit')missing.push('le montant');
  if(missing.length){alert('Champs obligatoires manquants : '+missing.join(', ')+'.');return null;}
  if(tel==='À compléter')tel='';
  if(!tel)tel='À compléter';
  const dep=dateDepart||dateArrivee;
  const isNew=!id;
  const nowTs=Date.now();
  const newCommentTxt=(document.getElementById('com-txt-new')||{}).value||'';
  const initCommentaires=newCommentTxt.trim()?[{id:gid(),auteur:'admin',auteurNom:S.admin.name,date:new Date().toISOString().slice(0,10),texte:newCommentTxt.trim(),visible:true}]:[];
  let newId=id;

  /* Calcul du résumé de modifications pour l'historique */
  function buildChangeLog(prev,next){
    if(!prev)return'Nouvelle réservation créée';
    const labels={
      domaine:'Domaine',dateArrivee:'Arrivée',heureArrivee:'Heure arrivée',
      dateDepart:'Départ',heureDepart:'Heure départ',status:'Statut',
      client:'Client',typeEvenement:'Type',nbPersonnes:'Couchages',
      nbSoiree:'Soirée',montant:'Montant',arrhes:'Arrhes',
      depotGarantie:'Dépôt',noteInterne:'Note',typeClient:'Type client',
      societe:'Société',tel:'Téléphone',email:'Email'
    };
    const changes=[];
    Object.keys(labels).forEach(k=>{
      const pv=prev[k],nv=next[k];
      if(String(pv||'')!==String(nv||'')){
        if(k==='montant'||k==='arrhes'||k==='depotGarantie'){
          changes.push(`${labels[k]} : ${money(pv||0)} → ${money(nv||0)}`);
        } else if(k==='dateArrivee'||k==='dateDepart'){
          changes.push(`${labels[k]} : ${ds(pv)||'—'} → ${ds(nv)||'—'}`);
        } else {
          changes.push(`${labels[k]} : ${pv||'—'} → ${nv||'—'}`);
        }
      }
    });
    return changes.length?changes.join(' · '):'Enregistrement (aucun changement détecté)';
  }

  let montantChanged=false,prevMontantVal=0;
  if(id){
    const r=D.reservations.find(x=>x.id===id);
    const prevSnap={...r};
    prevMontantVal=prevSnap.montant||0;
    montantChanged=(String(prevMontantVal)!==String(montant||0));
    const nextSnap={domaine,dateArrivee,heureArrivee,dateDepart:dep,heureDepart,status,client,typeEvenement,nbPersonnes,nbSoiree,montant,arrhes,depotGarantie,noteInterne,typeClient,societe,tel,email};
    const changeLog=buildChangeLog(prevSnap,nextSnap);
    Object.assign(r,{domaine,dateArrivee,heureArrivee,dateDepart:dep,heureDepart,status,client,civilite1,prenom1,nom1,tel,email,prenom2,nom2,tel2,email2,adresse,typeClient,societe,typeEvenement,nbPersonnes,nbSoiree,nbAdultes,nbEnfants,prestaGarde,noteInterne,caviste,prestasExterieurs,montant,arrhes,depotGarantie,avecContrat,prestataires,updatedAt:nowTs,lastChange:changeLog});
  }
  else{
    newId=gid();
    D.reservations.push({id:newId,domaine,dateArrivee,heureArrivee,dateDepart:dep,heureDepart,status,client,civilite1,prenom1,nom1,tel,email,prenom2,nom2,tel2,email2,adresse,typeClient,societe,typeEvenement,nbPersonnes,nbSoiree,nbAdultes,nbEnfants,prestaLines:{},prestaGarde,noteInterne,caviste,prestasExterieurs,montant,arrhes,depotGarantie,avecContrat,paiements:[],prestataires,commentaires:initCommentaires,createdAt:nowTs,updatedAt:nowTs,lastChange:'Nouvelle réservation créée'});
  }
  if(isNew&&newCommentTxt.trim()){
    const ct=getMenageInfo({domaine,nbPersonnes,nbSoiree,typeEvenement});
    if(ct)logActivity('commentaire',domaine,`💬 ${S.admin.name} → ${ct.name} : « ${newCommentTxt.trim()} »`,[ct.pid],false,newId);
  }
  /* Récupère les lignes de paiement saisies mais non encore enregistrées (nouvelles réservations
     ou lignes non encore auto-sauvegardées via maybeAddPayRow). */
  const _newR=D.reservations.find(x=>x.id===newId);
  const _paysAdded=[];
  if(_newR){
    for(let _rn=0;_rn<20;_rn++){
      const _dEl=document.getElementById('pay-new-date-'+_rn);
      if(!_dEl)break;
      const _aEl=document.getElementById('pay-new-amt-'+_rn);
      const _d=_dEl.value,_a=parseFloat(_aEl?_aEl.value:'')||0;
      if(_d&&_a){
        const _ty=(document.getElementById('pay-new-type-'+_rn)||{}).value||'Autre';
        const _cm=((document.getElementById('pay-new-comment-'+_rn)||{}).value||'').trim();
        if(!_newR.paiements)_newR.paiements=[];
        const _dup=(_newR.paiements||[]).some(p=>p.date===_d&&Math.abs(p.montant-_a)<0.01&&p.type===_ty);
        if(!_dup){_newR.paiements.push({id:gid(),date:_d,montant:_a,type:_ty,comment:_cm});_paysAdded.push(_ty+' '+money(_a)+' le '+ds(_d));}
      }
    }
  }
  /* Journal — uniquement les vraies actions : création, paiements ajoutés, changement de montant.
     Les petites modifs de champs (téléphone, email, dates…) ne sont pas journalisées. */
  if(isNew){
    logActivity('créée',domaine,'Création de la fiche',[],false,newId);
  } else {
    if(montantChanged)logActivity('paiement',domaine,`Montant de la réservation : ${money(prevMontantVal)} → ${money(montant||0)}`,[],false,id);
  }
  _paysAdded.forEach(function(desc){logActivity('paiement',domaine,'Paiement ajouté : '+desc,[],false,newId);});
  Object.keys(prestaGarde).forEach(pid=>{
    const normalize=(pg)=>{
      if(!pg)return null;
      const nights={};
      Object.keys(pg.nights||{}).sort().forEach(d=>{
        const n=pg.nights[d];
        nights[d]={duree:n.duree||'longue',paid:!!n.paid,payMethod:n.payMethod||''};
      });
      return{domaine:pg.domaine||'',nights};
    };
    const before=JSON.stringify(normalize(origGardeSnapshot[pid]));
    const after=JSON.stringify(normalize(prestaGarde[pid]));
    if(before===after)return; // rien de réellement modifié pour ce prestataire : pas de log trompeur
    const wasAbsent=!origGardeSnapshot[pid];
    logActivity('garde',domaine,`Gardiennage ${wasAbsent?'ajouté':'mis à jour'} — ${(typeClient==='entreprise'&&societe)?societe:client||'—'} (${fmt(dateArrivee)})`,[pid]);
  });
  saveD();
  return{newId,dateArrivee};
}

async function initApp(){
  const localSeenA=(D&&D.adminLastSeen)||{};
  const localSeenP=(D&&D.prestaLastSeen)||{};
  const remote=await fetchRemoteD();
  if(remote){
    /* On reprend les données du serveur, mais on conserve les marqueurs « lu » les plus récents
       (locaux ou distants) pour que rien de déjà lu ne réapparaisse au lancement. */
    remote.adminLastSeen=mergeSeen(localSeenA,remote.adminLastSeen);
    remote.prestaLastSeen=mergeSeen(localSeenP,remote.prestaLastSeen);
    D=remote;
  }
  runMigrations();
  saveD();
  if(!checkToken())render();else render();
  setInterval(async()=>{
    if(S.modal)return;
    const fresh=await fetchRemoteD();
    if(fresh&&JSON.stringify(fresh)!==JSON.stringify(D)){
      /* On préserve les marqueurs « lu » locaux (adminLastSeen / prestaLastSeen) :
         un marqueur ne recule jamais dans le temps. Sans ça, un rafraîchissement distant
         arrivant juste après un « Marquer comme lu » (avant que le push soit remonté)
         réaffichait les notifications déjà lues. */
      fresh.adminLastSeen=mergeSeen(D.adminLastSeen,fresh.adminLastSeen);
      fresh.prestaLastSeen=mergeSeen(D.prestaLastSeen,fresh.prestaLastSeen);
      D=fresh;
      try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}
      render();
    }
  },8000);
}
let touchStartX=null,touchStartY=null,touchLockDir=null;
/* Tant que la fiche réservation est ouverte, on rafraîchit le repérage des champs obligatoires
   (bordure rouge) à chaque saisie ou changement, où qu'il ait lieu dans le formulaire. */
document.addEventListener('input',function(){if(document.getElementById('m-typeclient'))checkContactFields();});
document.addEventListener('change',function(){if(document.getElementById('m-typeclient'))checkContactFields();});
document.addEventListener('touchstart',e=>{
  const grid=e.target.closest('.cal-grid');
  if(!grid){touchStartX=null;touchLockDir=null;return;}
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
  touchLockDir=null;
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(touchStartX===null)return;
  const dx=e.touches[0].clientX-touchStartX;
  const dy=e.touches[0].clientY-touchStartY;
  if(touchLockDir===null&&(Math.abs(dx)>8||Math.abs(dy)>8)){
    // On tranche une fois pour toutes dès les premiers pixels : geste horizontal (changement
    // de mois) OU vertical (défilement de la page), jamais les deux en même temps —
    // c'est ce qui rendait le glissement instable, surtout sur Android.
    touchLockDir=Math.abs(dx)>Math.abs(dy)*1.2?'x':'y';
  }
  if(touchLockDir==='x')e.preventDefault(); // bloque le scroll vertical pendant un swipe mois
},{passive:false});
document.addEventListener('touchend',e=>{
  if(touchStartX===null)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const wasX=touchLockDir==='x';
  touchStartX=null;touchLockDir=null;
  if(wasX&&Math.abs(dx)>55){
    if(dx<0)navMonthOnly('calMonth','calYear',1);
    else navMonthOnly('calMonth','calYear',-1);
  }
},{passive:true});
/* Fermeture d'une fenêtre (nouvelle résa, modification, etc.) par glissement vers le bas,
   comme dans plusieurs applications mobiles : on n'a pas besoin de taper « Fermer » ni de
   cliquer en dehors. Un glissement franc vers le bas, depuis n'importe quel endroit de la
   fenêtre, la referme — pour tout le monde (David, Svitlana, prestataires). On ne déclenche
   la fermeture que si la fenêtre est déjà remontée tout en haut de son défilement, pour ne
   jamais entrer en conflit avec un simple geste de défilement dans un long formulaire. */
let modalTouchStartY=null,modalTouchStartTime=0,modalAtTop=false,modalTouchKind=null;
document.addEventListener('touchstart',e=>{
  const modal=e.target.closest('.modal')||e.target.closest('.detail-panel');
  if(!modal){modalTouchStartY=null;modalTouchKind=null;return;}
  modalTouchKind=modal.classList.contains('detail-panel')?'panel':'modal';
  modalTouchStartY=e.touches[0].clientY;
  modalTouchStartTime=Date.now();
  modalAtTop=modal.scrollTop<=2;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(modalTouchStartY===null)return;
  const dy=e.changedTouches[0].clientY-modalTouchStartY;
  const dt=Math.max(1,Date.now()-modalTouchStartTime);
  const velocity=dy/dt;
  modalTouchStartY=null;
  if(modalAtTop&&dy>90&&velocity>0.35){
    if(modalTouchKind==='panel')closePanel();
    else if(S.modal)closeM();
  }
},{passive:true});
initApp();
